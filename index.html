// ─── WEEKLY ───────────────────────────────────────────────────────
function renderWeekly(cv) {
  cv.style.cssText='padding:0;overflow:hidden;display:flex;flex-direction:column;flex:1';

  // Get Mon–Sun of current week
  var base = new Date();
  base.setDate(base.getDate() + weekOffset*7);
  var dow = base.getDay();
  var mon = new Date(base);
  mon.setDate(base.getDate() - (dow===0?6:dow-1)); // Monday

  var days = [];
  for (var i=0;i<7;i++) {
    var dd2=new Date(mon); dd2.setDate(mon.getDate()+i); days.push(dd2);
  }

  // Week key for storing goals
  var wkKey = days[0].getFullYear()+'-W'+pad(days[0].getMonth()+1)+'-'+pad(days[0].getDate());
  if (!S.weeklyData) S.weeklyData = {};
  if (!S.weeklyData[wkKey]) S.weeklyData[wkKey] = { goals:[{t:'',d:false},{t:'',d:false},{t:'',d:false}] };
  var wd = S.weeklyData[wkKey];
  if (!wd.goals||wd.goals.length<3) wd.goals=[{t:'',d:false},{t:'',d:false},{t:'',d:false}];

  var today = todayStr();
  var fmt2 = function(d2){return d2.toLocaleDateString('en-US',{month:'short',day:'numeric'});};

  var page = el('div',''); page.id='weekly-page';
  cv.appendChild(page);

  // ── Nav ──
  var nav = el('div','wk-nav');
  var prev=el('button','cal-nav-btn'); prev.textContent='←'; prev.onclick=function(){weekOffset--;renderCanvas();};
  var tw2=el('button','cal-nav-btn cal-today-btn'); tw2.textContent='This Week'; tw2.onclick=function(){weekOffset=0;renderCanvas();};
  var next2=el('button','cal-nav-btn'); next2.textContent='→'; next2.onclick=function(){weekOffset++;renderCanvas();};
  var titleEl2=el('div','wk-nav-title');
  titleEl2.textContent='Week of '+fmt2(days[0])+' — '+fmt2(days[6])+', '+days[0].getFullYear();
  nav.appendChild(prev); nav.appendChild(titleEl2); nav.appendChild(tw2); nav.appendChild(next2);
  page.appendChild(nav);

  // ── Top 3 Weekly Goals ──
  var goalLabel = el('div','wk-section-label'); goalLabel.textContent='Top 3 Goals for the Week';
  page.appendChild(goalLabel);

  var goalsGrid = el('div','wk-goals');
  wd.goals.forEach(function(goal, i) {
    var card = el('div','wk-goal');
    var num = el('div','wk-goal-num'); num.textContent='Goal '+(i+1);
    var inp = document.createElement('textarea');
    inp.className='wk-goal-inp';
    inp.placeholder='What do you want to accomplish this week?';
    inp.value=goal.t||'';
    if(goal.d) { inp.style.textDecoration='line-through'; inp.style.color='var(--dim)'; }
    inp.oninput=(function(g){return function(){g.t=inp.value;save();};})(goal);
    var doneRow = el('label','wk-goal-done');
    var cb2=document.createElement('input'); cb2.type='checkbox'; cb2.checked=!!goal.d;
    cb2.onchange=(function(g,inp2){return function(){g.d=cb2.checked;inp2.style.textDecoration=g.d?'line-through':'';inp2.style.color=g.d?'var(--dim)':'var(--text)';save();};})(goal,inp);
    var doneLbl=el('span',''); doneLbl.textContent='Mark done';
    doneRow.appendChild(cb2); doneRow.appendChild(doneLbl);
    card.appendChild(num); card.appendChild(inp); card.appendChild(doneRow);
    goalsGrid.appendChild(card);
  });
  page.appendChild(goalsGrid);

  // ── 6-column day grid (Mon–Fri + Sat&Sun merged) ──
  var dayLabel2 = el('div','wk-section-label'); dayLabel2.textContent='Weekly Outlook';
  page.appendChild(dayLabel2);

  var grid = el('div','wk-grid');

  // Mon(0)–Fri(4) = 5 separate columns, Sat(5)+Sun(6) = 1 merged column
  var COLS = [
    {label:'MON', days:[days[0]]},
    {label:'TUE', days:[days[1]]},
    {label:'WED', days:[days[2]]},
    {label:'THU', days:[days[3]]},
    {label:'FRI', days:[days[4]]},
    {label:'SAT & SUN', days:[days[5],days[6]]},
  ];

  COLS.forEach(function(col) {
    var isToday = col.days.some(function(d2){
      return d2.getFullYear()+'-'+pad(d2.getMonth()+1)+'-'+pad(d2.getDate())===today;
    });

    var dayCard = el('div','wk-day'+(isToday?' today-col':''));

    // Header
    var hdr2 = el('div','wk-day-hdr');
    var nameEl = el('div','wk-day-name'); nameEl.textContent=col.label;
    var numEl2 = el('div','wk-day-num');
    if(col.days.length===1) {
      numEl2.textContent=col.days[0].getDate();
    } else {
      numEl2.textContent=col.days[0].getDate()+'/'+col.days[1].getDate();
    }
    hdr2.appendChild(nameEl); hdr2.appendChild(numEl2);
    dayCard.appendChild(hdr2);

    // Calendar events for these days
    var hasCalEvs=false;
    col.days.forEach(function(d2){
      var ds3=d2.getFullYear()+'-'+pad(d2.getMonth()+1)+'-'+pad(d2.getDate());
      var evs=(S.calEvents||[]).filter(function(ev){return ev.date===ds3||(ev.endDate&&ev.date<=ds3&&ev.endDate>=ds3);});
      if(evs.length&&!hasCalEvs){
        hasCalEvs=true;
        var evStrip=el('div','wk-cal-events');
        evs.forEach(function(ev){
          var evEl2=el('div','wk-cal-ev');
          var colors=['#5cb87a','#e8a030','#38bcd4','#c87de0','#e07840','#4da6ff','#e05a5a','#a09ab8'];
          evEl2.style.background=colors[ev.colorIdx||0];
          evEl2.textContent=ev.title;
          evStrip.appendChild(evEl2);
        });
        dayCard.appendChild(evStrip);
      }
    });

    // Tasks body — gather tasks from all boxes for these day dates
    // For weekly, we show all pending tasks (not date-filtered — this is a planning view)
    var body2 = el('div','wk-day-body');

    // Get any tasks that were explicitly assigned to this day via dailyData
    // Plus show boxes' tasks in the first column (Mon) as a reference
    // For simplicity: show all box tasks split across days based on their order
    // Actually — just make each day an open write-in area using dailyData
    col.days.forEach(function(d2){
      var ds3=d2.getFullYear()+'-'+pad(d2.getMonth()+1)+'-'+pad(d2.getDate());
      var dayD=getDayData(ds3);
      // Show targets if set
      dayD.targets.forEach(function(tgt){
        if(!tgt.t) return;
        var row2=el('div','wk-task');
        var cb3=document.createElement('input'); cb3.type='checkbox'; cb3.checked=!!tgt.d;
        cb3.style.accentColor='var(--gold)';
        var lbl4=el('label',tgt.d?'done':''); lbl4.textContent=tgt.t;
        cb3.onchange=(function(t2,l){return function(){t2.d=cb3.checked;l.className=t2.d?'done':'';save();};})(tgt,lbl4);
        row2.appendChild(cb3); row2.appendChild(lbl4); body2.appendChild(row2);
      });
    });

    // Show pending box tasks (all, as overview) only on first render if no day targets
    if(!body2.children.length) {
      var emptyHint=el('div',''); emptyHint.style.cssText='font-size:.7rem;color:var(--dim);padding:4px;font-style:italic;';
      emptyHint.textContent='No targets set — open Daily to plan';
      body2.appendChild(emptyHint);
    }

    dayCard.appendChild(body2);

    // Quick add (stored as daily target for first day of col)
    var addDs=col.days[0].getFullYear()+'-'+pad(col.days[0].getMonth()+1)+'-'+pad(col.days[0].getDate());
    var addRow2=el('div','wk-day-add');
    var addInp2=document.createElement('input'); addInp2.placeholder='+ add target…';
    var addBtn3=el('button',''); addBtn3.textContent='+';
    (function(dstr,ai2){
      addBtn3.onclick=function(){addWeekTarget(dstr,ai2);};
      ai2.onkeydown=function(e){if(e.key==='Enter')addWeekTarget(dstr,ai2);};
    })(addDs,addInp2);
    addRow2.appendChild(addInp2); addRow2.appendChild(addBtn3);
    dayCard.appendChild(addRow2);

    grid.appendChild(dayCard);
  });

  page.appendChild(grid);
}

function addWeekTarget(ds, inp) {
  var t=inp.value.trim(); if(!t) return;
  var dd3=getDayData(ds);
  // Find first empty target slot
  var filled=false;
  for(var i=0;i<dd3.targets.length;i++){
    if(!dd3.targets[i].t){dd3.targets[i].t=t;filled=true;break;}
  }
  if(!filled) dd3.targets.push({t:t,d:false});
  inp.value=''; save(); renderCanvas();
}

var DSTART = 5;   // 5 AM
var DEND   = 22;  // 10 PM
var DSLOT  = 16;  // px per 15 min → 64px/hr
var DPM    = DSLOT / 15; // px per minute
var DCANVAS_H = (DEND - DSTART) * 4 * DSLOT;
var dActiveInteraction = null;

function getDayData(ds) {
  if (!S.dailyData) S.dailyData = {};
  if (!S.dailyData[ds]) S.dailyData[ds] = { grateful:'', goal:'', targets:[{t:'',d:false},{t:'',d:false},{t:'',d:false}], great:'', wins:'', note:'' };
  var dd = S.dailyData[ds];
  if (!dd.targets || dd.targets.length < 3) { dd.targets = [{t:'',d:false},{t:'',d:false},{t:'',d:false}]; }
  return dd;
}

function getDayBlocks(ds) {
  if (!S.timeBlocks) S.timeBlocks = [];
  return S.timeBlocks.filter(function(b){ return b.date === ds; });
}

function fmtDMin(min) {
  var total = min + DSTART*60;
  var h = Math.floor(total/60), m = total%60;
  var suf = h<12?'AM':'PM'; var h12 = h===0||h===24?12:h>12?h-12:h;
  return m===0 ? h12+' '+suf : h12+':'+pad(m)+' '+suf;
}
function snapDMin(m){ return Math.round(m/15)*15; }
function clampDMin(m,dur){ return Math.max(0,Math.min(m,(DEND-DSTART)*60-dur)); }

function fmtHourLbl(h){
  var label12, label24;
  if(h===12) label12='12 PM';
  else if(h===0||h===24) label12='12 AM';
  else label12 = h<12 ? h+' AM' : (h-12)+' PM';
  label24 = (h < 10 ? '0' : '') + h + ':00';
  return label12 + '|' + label24; // sentinel — split in render
}

function guessDomainColor(title) {
  var t=title.toLowerCase();
  if(/army|ocs|meps|asvab|basic|acft|military/.test(t)) return 'coaching'; // green
  if(/teach|class|student|lesson|rubric|grade|ramhaus/.test(t)) return 'teaching';
  if(/coach|track|meet|athlete|practice|relay/.test(t)) return 'coaching';
  if(/art|paint|draw|sculpt|blender|genesis|game/.test(t)) return 'art';
  if(/house|garage|tiki|home depot/.test(t)) return 'personal';
  return 'general';
}

// Domain color map matching Clarity exactly
var BLOCK_COLORS = {
  teaching: { bg:'#261a08', border:'#e8a030' },
  coaching: { bg:'#0f2016', border:'#4caf50' },
  personal: { bg:'#1e1230', border:'#9c6dd8' },
  art:      { bg:'#280d1e', border:'#d43f8d' },
  army:     { bg:'#081828', border:'#3a9bdc' },
  general:  { bg:'#1e1a0e', border:'#e8a030' },
};

// ── SCHEDULER — ported directly from Clarity ──────────────────────
var Sched = (function(){
  var _canvas = null;
  var _ds = null;
  var _titleInp = null;
  var _addBtn = null;
  var _active = null; // { type:'drag'|'resize', blkId, el, startY, startMin, startDur }
  var _listenersAdded = false;
  var _pendingMin = null; // minute clicked on canvas, waiting for title

  var PX_PER_MIN = DSLOT / 15;

  function minToY(min) { return min * PX_PER_MIN; }
  function yToMin(y)   { return snapDMin(Math.max(0, Math.min(y / PX_PER_MIN, (DEND-DSTART)*60 - 15))); }

  function fmtMin(min) {
    var total = min + DSTART*60;
    var h = Math.floor(total/60), m = total%60;
    var suf = h<12?'AM':'PM', h12 = h===0?12:h>12?h-12:h;
    return m===0 ? h12+' '+suf : h12+':'+pad(m)+' '+suf;
  }

  function getTodayBlocks() {
    if(!S.timeBlocks) S.timeBlocks=[];
    return S.timeBlocks.filter(function(b){ return b.date===_ds; });
  }

  function redraw() {
    if (!_canvas) return;
    // Remove old blocks and now-line
    var toRemove = _canvas.querySelectorAll('.gcal-block, #sched-now-line, #sched-now-dot');
    for(var i=0;i<toRemove.length;i++) _canvas.removeChild(toRemove[i]);

    // Draw blocks
    getTodayBlocks().forEach(function(blk){ _drawBlock(blk); });

    // Now line
    var now = new Date(), nowH = now.getHours() + now.getMinutes()/60;
    if (nowH >= DSTART && nowH <= DEND) {
      var py = (nowH - DSTART) * 60 * PX_PER_MIN;
      var nl = el('div',''); nl.id='sched-now-line';
      nl.style.cssText='position:absolute;left:-46px;right:0;height:2px;background:var(--danger);z-index:8;pointer-events:none;top:'+py+'px';
      var nd = el('div',''); nd.id='sched-now-dot';
      nd.style.cssText='position:absolute;left:-9px;width:9px;height:9px;border-radius:50%;background:var(--danger);z-index:9;pointer-events:none;top:'+(py-4)+'px';
      _canvas.appendChild(nl);
      _canvas.appendChild(nd);
    }
  }

  function _drawBlock(blk) {
    var domain = blk.color || 'general';
    var cols = BLOCK_COLORS[domain] || BLOCK_COLORS.general;

    var div = document.createElement('div');
    div.className = 'gcal-block ' + domain;
    div.dataset.blkId = blk.id;
    div.style.cssText = [
      'position:absolute',
      'left:3px','right:3px',
      'border-radius:7px',
      'border-left:4px solid '+cols.border,
      'background:'+cols.bg,
      'padding:4px 8px 4px 6px',
      'cursor:grab',
      'overflow:hidden',
      'box-shadow:0 1px 6px rgba(0,0,0,.4)',
      'z-index:2',
      'min-height:24px',
      'top:'+minToY(blk.startMin)+'px',
      'height:'+Math.max(24, minToY(blk.durationMin))+'px',
    ].join(';');

    var titleEl = el('div','gcal-block-title'); titleEl.textContent = blk.title;
    var timeEl  = el('div','gcal-block-time');  timeEl.textContent  = fmtMin(blk.startMin)+' – '+fmtMin(blk.startMin+blk.durationMin);
    var delEl   = el('div','gcal-block-del');   delEl.textContent   = '✕';
    var rzEl    = el('div','gcal-resize-handle');

    delEl.addEventListener('mousedown', function(e){
      e.stopPropagation();
      S.timeBlocks = (S.timeBlocks||[]).filter(function(x){ return x.id!==blk.id; });
      save(); redraw();
    });

    div.addEventListener('mousedown', function(e){
      if (e.target === delEl) return;
      e.preventDefault(); e.stopPropagation();
      var isResize = div.contains(rzEl) && (e.target===rzEl || rzEl.contains(e.target));
      var blkRef = (S.timeBlocks||[]).find(function(b){ return b.id===blk.id; });
      if (!blkRef) return;
      _active = {
        type: isResize ? 'resize' : 'drag',
        blkId: blk.id,
        el: div,
        timeEl: timeEl,
        startY: e.clientY,
        startMin: blkRef.startMin,
        startDur: blkRef.durationMin,
      };
      div.classList.add(isResize ? 'resizing' : 'dragging');
    });

    div.appendChild(delEl); div.appendChild(titleEl); div.appendChild(timeEl); div.appendChild(rzEl);
    _canvas.appendChild(div);
  }

  function _onMouseMove(e) {
    if (!_active) return;
    var dy   = e.clientY - _active.startY;
    var dMin = dy / PX_PER_MIN;
    var blkRef = (S.timeBlocks||[]).find(function(b){ return b.id===_active.blkId; });
    if (!blkRef) return;

    if (_active.type === 'drag') {
      var newMin = snapDMin(Math.max(0, Math.min(_active.startMin + dMin, (DEND-DSTART)*60 - blkRef.durationMin)));
      _active.el.style.top = minToY(newMin)+'px';
      _active.timeEl.textContent = fmtMin(newMin)+' – '+fmtMin(newMin+blkRef.durationMin);
    } else {
      var newDur = snapDMin(Math.max(15, _active.startDur + dMin));
      var maxDur = (DEND-DSTART)*60 - blkRef.startMin;
      var dur = Math.min(newDur, maxDur);
      _active.el.style.height = Math.max(24, minToY(dur))+'px';
      _active.timeEl.textContent = fmtMin(blkRef.startMin)+' – '+fmtMin(blkRef.startMin+dur);
    }
  }

  function _onMouseUp(e) {
    if (!_active) return;
    var dy   = e.clientY - _active.startY;
    var dMin = dy / PX_PER_MIN;
    var blkRef = (S.timeBlocks||[]).find(function(b){ return b.id===_active.blkId; });
    if (blkRef) {
      if (_active.type === 'drag') {
        blkRef.startMin = snapDMin(Math.max(0, Math.min(_active.startMin+dMin, (DEND-DSTART)*60-blkRef.durationMin)));
      } else {
        var nd = snapDMin(Math.max(15, _active.startDur+dMin));
        blkRef.durationMin = Math.min(nd, (DEND-DSTART)*60-blkRef.startMin);
      }
      save();
    }
    _active.el.classList.remove('dragging','resizing');
    _active = null;
    redraw();
  }

  function _addBlock(title, startMin) {
    var color = guessDomainColor(title);
    if (!S.timeBlocks) S.timeBlocks = [];
    S.timeBlocks.push({ id:'tb'+Date.now(), date:_ds, startMin:startMin, durationMin:60, title:title, color:color });
    save();
    redraw();
    // Scroll to block
    var tw = document.getElementById('daily-time-wrap');
    if (tw) tw.scrollTop = Math.max(0, minToY(startMin) - 100);
  }

  function init(canvasEl, dateStr, titleInp, addBtn) {
    _canvas   = canvasEl;
    _ds       = dateStr;
    _titleInp = titleInp;
    _addBtn   = addBtn;
    _active   = null;
    _pendingMin = null;

    // Global listeners — register once only
    if (!_listenersAdded) {
      document.addEventListener('mousemove', _onMouseMove);
      document.addEventListener('mouseup',   _onMouseUp);
      _listenersAdded = true;
    }

    // Canvas mousedown → snap to time, pre-fill input (like Clarity)
    _canvas.addEventListener('mousedown', function(e) {
      // Only fire on empty canvas area
      var t2 = e.target;
      while (t2 && t2 !== _canvas) {
        if (t2.classList.contains('gcal-block')) return;
        t2 = t2.parentElement;
      }
      var rect = _canvas.getBoundingClientRect();
      _pendingMin = yToMin(e.clientY - rect.top);

      // Show snap indicator briefly
      if (_titleInp) {
        _titleInp.placeholder = 'Block at ' + fmtMin(_pendingMin) + '…';
        _titleInp.focus();
      }
    });

    // Add button / Enter key
    if (_titleInp) {
      _titleInp.onkeydown = function(e) {
        if (e.key === 'Enter') _doAdd();
      };
      // Reset placeholder on blur if nothing typed
      _titleInp.onblur = function() {
        if (!_titleInp.value) _titleInp.placeholder = "What's happening?";
      };
    }
    if (_addBtn) {
      _addBtn.onclick = _doAdd;
    }
  }

  function _doAdd() {
    if (!_titleInp) return;
    var title = _titleInp.value.trim();
    if (!title) return;
    var startMin = (_pendingMin !== null) ? _pendingMin : (new Date().getHours() - DSTART) * 60;
    startMin = Math.max(0, Math.min(startMin, (DEND-DSTART)*60-15));
    _titleInp.value = '';
    _titleInp.placeholder = "What's happening?";
    _pendingMin = null;
    _addBlock(title, startMin);
  }

  return { init:init, redraw:redraw };
})();

function addDayTask(boxId, inp) {
  var t=inp.value.trim(); if(!t) return;
  if(!S.boxes[boxId].tasks) S.boxes[boxId].tasks=[];
  S.boxes[boxId].tasks.push({t:t,d:false});
  inp.value=''; save(); renderCanvas();
  setTimeout(function(){inp.focus();},0);
}

        {id:'u6p1',tier:'TIER 1',name:'Composition Practice',pts:2,desc:'Explore the principles of balance through a series of quick thumbnail compositions using basic shapes.',materials:['Composition worksheet','Pencil','Markers or colored pencils'],steps:['You will be given a worksheet with 6 blank composition boxes.','In each box, arrange simple shapes to demonstrate a different balance type: symmetrical, asymmetrical, radial, and more.','Label each composition with the balance type it demonstrates.','Use value or color in at least 3 of the 6 boxes to show how visual weight works.','No detailed drawing — shapes only. This is a design exercise, not an illustration.'],tip:'Visual weight isn\'t just about size — a small dark shape can balance a large light one.',rubric:[{name:'Balance Variety',desc:'Multiple balance types demonstrated',d:{4:'4+ types clearly shown and labeled',3:'3 types correct',2:'2 types correct',1:'1 type or labels missing',0:'Not attempted'}},{name:'Visual Weight Awareness',desc:'Color or value used to show weight',d:{4:'Clear use of value/color as weight in 3+ boxes',3:'Used in 2 boxes',2:'Used in 1 box',1:'No awareness of visual weight',0:'Not attempted'}},{name:'Completion',desc:'All 6 boxes filled',d:{4:'All 6 complete and labeled',3:'5 complete',2:'3–4 complete',1:'1–2 complete',0:'Not submitted'}},{name:'Effort',desc:'Compositions are thoughtful, not random',d:{4:'All boxes show deliberate design thinking',3:'Most are thoughtful',2:'Some thought evident',1:'Shapes placed randomly',0:'Not submitted'}}]},

        {id:'u6p3',tier:'TIER 1',name:'Symmetrical Name Design',pts:2,desc:'Design your name as a symmetrical composition — letter forms become the building blocks of a balanced layout.',materials:['Pencil','Ruler','Markers or fine liners','Drawing paper'],steps:['Write your name in block letters across the center of your paper.','Fold the paper in half (or use a centerline) to establish your axis of symmetry.','Mirror the design on both sides of the axis.','Add pattern, texture, or decorative elements within the letters — keeping them symmetrical.','Outline in pen or marker and add color or value.'],tip:'Symmetrical doesn\'t have to mean boring — push the letterforms to be decorative, geometric, or stylized.',rubric:[{name:'Symmetry Accuracy',desc:'Both sides mirror each other',d:{4:'Perfect or near-perfect symmetry throughout',3:'Mostly symmetrical, minor errors',2:'Some symmetry, some inconsistency',1:'Asymmetrical — symmetry not achieved',0:'Not attempted'}},{name:'Letter Design',desc:'Letters are stylized and decorative',d:{4:'Creative, well-designed letterforms',3:'Good design, some plain letters',2:'Basic block letters',1:'No design consideration',0:'Not attempted'}},{name:'Pattern / Detail',desc:'Decorative elements fill the letters',d:{4:'Rich detail throughout',3:'Good detail in most areas',2:'Some detail',1:'Minimal detail',0:'Not attempted'}},{name:'Craftsmanship',desc:'Clean lines and neat coloring',d:{4:'Very clean and polished',3:'Mostly clean',2:'Some roughness',1:'Very rough',0:'Not attempted'}}]},
        {id:'u6p7',tier:'TIER 3',name:'Minimalistic Album Cover',pts:8,desc:'Design a fictional album cover that uses minimalism and balance to communicate a mood or identity.',materials:['Heavy paper or cardstock (5×5 or 6×6 inches)','Ruler','Pencil','Paint, markers, or colored pencils','Fine liner for text'],steps:['Invent a band name and album title — these are your only text elements.','Choose a single dominant image or shape.','Sketch 3 thumbnail compositions before committing.','Choose a palette of 2–3 colors maximum.','Construct your final design with clean, precise shapes and lettering.','Balance your text and image.','Evaluate: could this sit next to a real album cover and hold its own?'],tip:'The best minimalist design removes everything that isn\'t necessary.',rubric:[{name:'Minimalism',desc:'Design uses restraint — only essential elements',d:{4:'Truly minimal — every element earns its place',3:'Mostly minimal, one unnecessary element',2:'Some clutter',1:'Overcrowded, not minimalist',0:'Not attempted'}},{name:'Balance',desc:'Text and image are balanced compositionally',d:{4:'Strong, intentional balance',3:'Mostly balanced',2:'Some imbalance',1:'Clearly unbalanced',0:'Not attempted'}},{name:'Concept',desc:'Design communicates a mood or identity',d:{4:'Strong, clear concept',3:'Concept readable',2:'Vague concept',1:'No clear concept',0:'Not attempted'}},{name:'Typography',desc:'Band and album text is clean and designed',d:{4:'Lettering is intentional and well-executed',3:'Clean lettering, minimal design',2:'Basic lettering',1:'Illegible or careless',0:'Not attempted'}},{name:'Craftsmanship',desc:'Clean, precise, professional finish',d:{4:'Very polished',3:'Mostly clean',2:'Some roughness',1:'Very rough',0:'Not attempted'}}]},
        {id:'u6p9',tier:'TIER 3',name:'Master Study — Josef Albers',pts:8,desc:'Study and recreate a work from Albers\' Homage to the Square series, analyzing how he used color relationships to create balance, depth, and optical illusion.',materials:['Albers reference image (printed)','Ruler','Tape or masking tape','Paint (acrylic or gouache)','Canvas board or heavy paper'],steps:['Research Josef Albers and his Homage to the Square series.','Choose one painting from the series to study.','Use a ruler and tape to mask off the nested square composition precisely.','Mix your colors carefully — Albers\' whole point is that colors look different depending on what surrounds them.','Paint each square as a perfectly flat, even area of color. No brushstrokes visible.','Remove tape carefully once paint is dry.','Write 2–3 sentences on the back: how do the colors interact?'],tip:'Albers proved that the same color looks completely different depending on what\'s next to it.',rubric:[{name:'Compositional Accuracy',desc:'Nested squares are correctly proportioned',d:{4:'Precise, clean nested square structure',3:'Good structure, minor proportion errors',2:'Basic structure present',1:'Squares poorly constructed',0:'Not attempted'}},{name:'Color Mixing',desc:'Colors closely match the chosen Albers work',d:{4:'Accurate, carefully mixed colors',3:'Close matches with some variation',2:'Approximate colors',1:'Colors not matched',0:'Not attempted'}},{name:'Flat Paint Application',desc:'Each square is smooth and even',d:{4:'Perfectly flat, no brushstrokes visible',3:'Mostly flat, minor texture',2:'Some uneven areas',1:'Very textured, not flat',0:'Not attempted'}},{name:'Written Reflection',desc:'Color interaction described in writing',d:{4:'Thoughtful, specific observation of color interaction',3:'Good reflection, some vagueness',2:'Basic reflection',1:'Very vague or missing',0:'Not attempted'}},{name:'Craftsmanship',desc:'Clean edges, no paint bleed',d:{4:'Crisp, professional edges throughout',3:'Mostly clean',2:'Some bleed',1:'Very rough edges',0:'Not attempted'}}]},

    units:[
      { id:'u19', num:19, title:'Heads + Self Portraits', overview:'The human face is one of the most observed and least accurately drawn subjects in art. This unit replaces assumptions with structure, using the Loomis method to build proportion and feature placement from the ground up.', deadlines:{t1:'TBD',t2:'TBD',t3:'TBD'}, projects:[
        {id:'u19p2',tier:'TIER 1',name:'Facial Feature Worksheet',pts:2,desc:'Study and practice drawing individual facial features — eyes, nose, mouth, and ears — in isolation before combining them.',materials:['Facial Feature worksheet','Pencil','Eraser'],steps:['Section 1 — Eyes: Draw a front-view eye, then a 3/4 view eye. Focus on the tear duct, iris shape, and eyelid thickness.','Section 2 — Nose: Draw a front-view nose and a 3/4 view nose. Think of the nose as 3 spheres and a base.','Section 3 — Mouth: Draw lips in rest position, then a slight smile. Focus on the cupid\'s bow and the shadow under the lower lip.','Section 4 — Ear: Draw a front-view ear. Note the inner ridges — helix, antihelix, and lobe.','Add light shading to each feature to show basic form.'],tip:'Study features separately before putting them together. Most proportion errors come from guessing instead of observing.',rubric:[{name:'Eye Accuracy',desc:'Front and 3/4 view eyes drawn correctly',d:{4:'Both views accurate with shading',3:'Both views present, minor errors',2:'One view correct',1:'Eyes inaccurate',0:'Not attempted'}},{name:'Nose Accuracy',desc:'Front and 3/4 view nose drawn correctly',d:{4:'Both views accurate with shading',3:'Both views present, minor errors',2:'One view correct',1:'Nose inaccurate',0:'Not attempted'}},{name:'Mouth Accuracy',desc:'Lips drawn in two positions',d:{4:'Both positions accurate with shading',3:'Both present, minor errors',2:'One position correct',1:'Mouth inaccurate',0:'Not attempted'}},{name:'Ear Accuracy',desc:'Ear with inner structure drawn',d:{4:'Accurate with inner ridges and shading',3:'Good shape, some inner detail',2:'Basic shape, no inner detail',1:'Ear unrecognizable',0:'Not attempted'}}]},
        {id:'u19p3',tier:'TIER 1',name:'Loomis Head Drawing',pts:2,desc:'Use the Loomis method to construct a proportionally accurate head from a sphere, a plane cut, and a centerline.',materials:['Pencil','Blank paper','Loomis reference handout'],steps:['Draw a circle — this is the cranial mass.','Slice off a flat plane on one side to create the cheekbone/jaw area.','Add a vertical centerline and horizontal brow line to establish the face direction.','Place the brow line, nose line (halfway between brow and chin), and mouth line (1/3 above chin).','Add eyes on the brow line — one eye-width apart.','Add the nose, mouth, and ears using your measured lines.','Draw at least 2 heads: one front view, one 3/4 view.'],tip:'The eyes are at the MIDPOINT of the head — not near the top. Measure before you place them.',rubric:[{name:'Loomis Construction',desc:'Sphere + plane method used correctly',d:{4:'Both heads show clear Loomis construction',3:'One head correct, one partial',2:'Method attempted but inconsistent',1:'Method not used',0:'Not attempted'}},{name:'Proportions',desc:'Features placed at correct landmarks',d:{4:'All features correctly proportioned',3:'Most features correct',2:'Some features off',1:'Proportions significantly off',0:'Not attempted'}},{name:'Two Views',desc:'Front and 3/4 view both present',d:{4:'Both views complete and accurate',3:'Both present, one stronger',2:'One view complete',1:'Only one partial view',0:'Not attempted'}},{name:'Craftsmanship',desc:'Clean construction lines and finished drawing',d:{4:'Clean and polished',3:'Mostly clean',2:'Some roughness',1:'Very rough',0:'Not attempted'}}]},
        {id:'u19p4',tier:'QUIZ',name:'Loomis + Head Quiz',pts:2,desc:'Assess understanding of the Loomis method, facial proportions, and feature placement.',materials:['Pencil','Quiz handout'],steps:['Complete all written questions on the quiz.','Label the diagram sections with correct facial proportion landmarks.','Draw a small Loomis head from memory in the blank section.'],tip:'If you can draw a Loomis head from scratch without looking, you\'ll ace this.',rubric:[]},
        {id:'u19p8',tier:'TIER 3',name:'The Selfie Project',pts:8,desc:'Create a fully realized self-portrait that communicates something true about your identity — not just what you look like, but who you are.',materials:['Selfie reference photo (printed or on device)','Pencil, pen, or paint','Canvas board or heavy paper','Any additional media of your choice'],steps:['Take or choose a selfie that feels like YOU — consider angle, expression, and setting.','Sketch the portrait using the Loomis method for accurate proportions.','Decide on your medium: pencil, paint, mixed media, collage, etc.','Incorporate at least one personal element beyond the face: background, objects, patterns, text.','Refine your value structure — light source should be consistent.','Final piece should feel personal, not just technical.'],tip:'The best self-portraits tell you something about the person you couldn\'t learn from a photo.',rubric:[{name:'Likeness & Proportion',desc:'Recognizable self-portrait with accurate proportions',d:{4:'Strong likeness, accurate proportions throughout',3:'Recognizable, minor proportion errors',2:'Somewhat recognizable',1:'Barely recognizable',0:'Not attempted'}},{name:'Personal Identity',desc:'Piece communicates something beyond appearance',d:{4:'Strong personal concept clearly expressed',3:'Some personal element present',2:'Minimal personal content',1:'No personal concept',0:'Not attempted'}},{name:'Technical Skill',desc:'Medium used with control and intention',d:{4:'Skilled use of chosen medium',3:'Good control, minor issues',2:'Some control',1:'Struggling with medium',0:'Not attempted'}},{name:'Value / Color',desc:'Light source consistent, full range',d:{4:'Strong value or color structure',3:'Good structure, minor gaps',2:'Some value present',1:'Mostly flat',0:'Not attempted'}},{name:'Effort & Completion',desc:'Fully finished and polished',d:{4:'Complete and clearly invested in',3:'Complete, some areas underdeveloped',2:'Partially complete',1:'Barely started',0:'Not submitted'}}]},
        {id:'u19p10',tier:'TIER 3',name:'Master Study — Jean-Michel Basquiat',pts:8,desc:'Study and recreate a work by Basquiat, focusing on his use of raw mark-making, text, symbols, and expressive portraiture.',materials:['Basquiat reference image (printed)','Acrylic paint or mixed media','Canvas board or heavy paper','Markers, oil pastel, or crayon for text and marks'],steps:['Research Jean-Michel Basquiat — look at 10+ works. Note his use of text, crowns, crossed-out words, and raw line.','Choose one Basquiat portrait work to study.','Sketch the basic composition — don\'t overthink it. Basquiat worked fast and raw.','Block in the main colors. Basquiat used bold, clashing color.','Add text, symbols, and mark layers on top of the paint.','Cross out words, add arrows, repeat shapes — this is part of his visual language.','Don\'t over-refine. Rough edges and visible struggle are part of the style.'],tip:'Basquiat\'s work is about identity, history, and power. Your study should feel alive, not polished.',rubric:[{name:'Style Accuracy',desc:'Work reflects Basquiat\'s visual language'},{name:'Text & Symbol Use',desc:'Words and marks integrated into composition'},{name:'Color',desc:'Bold, expressive palette'},{name:'Raw Energy',desc:'Work feels alive and unpolished'},{name:'Effort & Research',desc:'Clearly studied the source work'}]},

      { id:'u20', num:20, title:'Body + Character Design', overview:'Figure drawing is the foundation of character design. This unit builds proportion and figure skills through the 8-head model, then applies them to original character work, costume design, and full production pieces.', deadlines:{t1:'TBD',t2:'TBD',t3:'TBD'}, projects:[
        {id:'u20p1',tier:'TIER 1',name:'8 Head Model Practice',pts:2,desc:'Learn the industry-standard 8-head proportion system used in figure drawing, fashion illustration, and character design.',materials:['8 Head Model worksheet','Pencil','Ruler'],steps:['Draw a vertical line and divide it into 8 equal units — each unit = one head height.','Use the landmark guide: Head (1), Chest/nipple line (2), Navel (3), Crotch (4), Mid-thigh (5), Knee (6), Mid-shin (7), Feet (8).','Sketch the basic body form over your measurement guide.','Draw the figure a second time from scratch using your measurements, this time adding more form.','Check proportions: arms reach to mid-thigh, shoulders are 2 heads wide.'],tip:'The 8-head model is a guide, not a cage. Real bodies vary — but knowing the standard lets you break it intentionally.',rubric:[{name:'Proportion Accuracy',desc:'8 head units used correctly'},{name:'Body Mass',desc:'Torso, limbs, and head read as solid forms'},{name:'Two Attempts',desc:'Both figures present'},{name:'Craftsmanship',desc:'Clean, controlled linework'}]},
        {id:'u20p3',tier:'QUIZ',name:'Body Comp Quiz',pts:2,desc:'Assess understanding of the 8-head proportion system, body landmarks, and figure drawing vocabulary.',materials:['Pencil','Quiz handout'],steps:['Label the 8 landmark positions on a provided figure diagram.','Answer short written questions about proportion and figure structure.','Draw a quick 8-head proportion guide from memory in the blank section.'],tip:'If you can place all 8 landmarks without looking, you\'ll ace this.',rubric:[]},
        {id:'u20p4',tier:'TIER 2',name:'Original Character Design',pts:3,desc:'Design an original character using the 8-head model as your proportion foundation.',materials:['Pencil','Pen or fine liner','Colored pencils or markers','Drawing paper'],steps:['Start with the 8-head proportion guide — block in the body mass first.','Decide on your character\'s role: hero, villain, civilian, creature, etc.','Design the silhouette first — a strong character reads as a clear shape from a distance.','Add costume, clothing, and accessories that reinforce the character\'s identity.','Draw the character\'s face in a small inset box — expressions matter.','Add a name and 3-word personality description beside the character.','Ink and color your final character.'],tip:'The best character designs are readable as a silhouette alone.',rubric:[{name:'Proportion',desc:'8-head model used correctly'},{name:'Silhouette Strength',desc:'Character reads clearly as a shape'},{name:'Design Cohesion',desc:'Costume and personality feel unified'},{name:'Completion',desc:'Inked, colored, named, and described'}]},
        {id:'u20p9',tier:'TIER 3',name:'Comic Strip',pts:8,desc:'Write and illustrate a 6–8 panel comic strip featuring your original character.',materials:['Pencil','Pen or fine liner','Ruler','Markers or ink','Comic strip paper or heavy paper divided into panels'],steps:['Plan your story first — write a 1-sentence summary: who, what, where, and why it matters.','Thumbnail all 6–8 panels in tiny sketches before drawing full size.','Each panel should have a clear purpose — establish, action, reaction, resolution.','Vary your panel sizes — close-ups for emotion, wide shots for action and environment.','Draw figures using the 8-head model.','Add speech bubbles and captions.','Ink all panels. Add spot black for shadow and depth.'],tip:'Comics are about what you leave OUT as much as what you include.',rubric:[{name:'Visual Storytelling',desc:'Story is clear without needing explanation'},{name:'Panel Composition',desc:'Varied panel sizes and camera angles'},{name:'Figure Drawing',desc:'Characters consistently drawn using 8-head model'},{name:'Lettering & Dialogue',desc:'Text is legible and placed well'},{name:'Completion',desc:'6–8 panels fully inked and finished'}]},
        {id:'u20p12',tier:'TIER 3',name:'Master Study — Jack Kirby',pts:8,desc:'Study and recreate a page or panel from Jack Kirby\'s work, analyzing his use of dynamic figure drawing, energy lines, and compositional power.',materials:['Kirby reference panel (printed)','Pencil','Pen or fine liner','Markers or ink','Drawing paper'],steps:['Research Jack Kirby — look at his work on Fantastic Four, New Gods, Captain America.','Choose one full panel or half-page composition to recreate.','Lightly sketch the composition — note how Kirby uses exaggerated foreshortening and massive figures.','Pay attention to his \'Kirby Krackle\' — the pattern of black dots he uses to show energy.','Ink with bold, confident lines. Vary your line weight.','Add spot black aggressively — Kirby used heavy shadow to create drama.','Write 2–3 sentences on the back: what makes this panel work?'],tip:'Kirby drew like the figures were about to explode off the page. Don\'t be timid.',rubric:[{name:'Composition Accuracy',desc:'Layout matches the chosen Kirby panel'},{name:'Figure Energy',desc:'Figures are dynamic and exaggerated'},{name:'Line Weight',desc:'Bold, varied line weight used'},{name:'Spot Black',desc:'Heavy shadow and Kirby Krackle used'},{name:'Written Reflection',desc:'Analysis of the panel\'s effectiveness'}]},

// curriculum state
var currCourseId = 'dp2';
var currUnitId   = 'u4';
var currProjId   = null;



function initCurriculumSidebarControls(wrap) {
  var left = document.getElementById('curr-left');
  var detail = document.getElementById('curr-detail');
  var leftHandle = document.getElementById('curr-left-resize');
  var detailHandle = document.getElementById('curr-detail-resize');
  var leftCollapse = document.getElementById('curr-left-collapse');
  var detailCollapse = document.getElementById('curr-detail-collapse');
  if (!wrap || !left || !detail || !leftHandle || !detailHandle || !leftCollapse || !detailCollapse) return;
  if (!S.ui) S.ui = {};

  function applyCurriculumLayout() {
    var mobile = window.innerWidth <= 900;
    if (mobile) {
      left.classList.remove('collapsed');
      detail.classList.remove('collapsed');
      left.style.width = '';
      detail.style.width = '';
      leftCollapse.style.display = 'none';
      detailCollapse.style.display = 'none';
      return;
    }

    left.style.width = clamp(S.ui.currLeftWidth || 230, 180, 420) + 'px';
    detail.style.width = clamp(S.ui.currDetailWidth || 400, 280, 620) + 'px';
    left.classList.toggle('collapsed', !!S.ui.currLeftCollapsed);
    detail.classList.toggle('collapsed', !!S.ui.currDetailCollapsed);

    leftCollapse.style.display = 'flex';
    detailCollapse.style.display = 'flex';
    leftCollapse.textContent = S.ui.currLeftCollapsed ? '▶' : '◀';
    leftCollapse.title = S.ui.currLeftCollapsed ? 'Expand curriculum sidebar' : 'Collapse curriculum sidebar';
    leftCollapse.style.right = S.ui.currLeftCollapsed ? '-28px' : '8px';
    detailCollapse.textContent = S.ui.currDetailCollapsed ? '◀' : '▶';
    detailCollapse.title = S.ui.currDetailCollapsed ? 'Expand project detail sidebar' : 'Collapse project detail sidebar';
    detailCollapse.style.left = S.ui.currDetailCollapsed ? '-28px' : '8px';
  }

  leftCollapse.onclick = function() {
    if (window.innerWidth <= 900) return;
    S.ui.currLeftCollapsed = !S.ui.currLeftCollapsed;
    save();
    applyCurriculumLayout();
  };

  detailCollapse.onclick = function() {
    if (window.innerWidth <= 900) return;
    S.ui.currDetailCollapsed = !S.ui.currDetailCollapsed;
    save();
    applyCurriculumLayout();
  };

  function startCurrResize(which, e) {
    if (window.innerWidth <= 900) return;
    e.preventDefault();
    wrap.classList.add('dragging-curr-sidebars');
    var handle = which === 'left' ? leftHandle : detailHandle;
    handle.classList.add('dragging');

    function move(ev) {
      var rect = wrap.getBoundingClientRect();
      if (which === 'left') {
        S.ui.currLeftCollapsed = false;
        S.ui.currLeftWidth = clamp(ev.clientX - rect.left, 180, 420);
      } else {
        S.ui.currDetailCollapsed = false;
        S.ui.currDetailWidth = clamp(rect.right - ev.clientX, 280, 620);
      }
      applyCurriculumLayout();
    }

    function up() {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      wrap.classList.remove('dragging-curr-sidebars');
      handle.classList.remove('dragging');
      save();
    }

    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  }

  leftHandle.onmousedown = function(e) { startCurrResize('left', e); };
  detailHandle.onmousedown = function(e) { startCurrResize('right', e); };
  applyCurriculumLayout();
}

function renderCurriculum(cv) {
  cv.style.cssText='padding:0;overflow:hidden;display:flex;flex-direction:column;flex:1';

  var curriculum = S.curriculum || CURRICULUM;
  var editMode = !!S.currEditMode;

  function saveCurr(){ save(); }
  function getCourse(){ return curriculum.find(function(c){return c.id===currCourseId;}); }
  function getUnit(course){ return (course&&course.units||[]).find(function(u){return u.id===currUnitId;}); }
  function getProj(unit){ return (unit&&unit.projects||[]).find(function(p){return p.id===currProjId;}); }

  function makeProjectTemplate(tier, sourceProj){
    var template = sourceProj ? dc(sourceProj) : {
      tier:tier,
      name:'New Project',
      pts:(tier==='TIER 1'?2:tier==='TIER 2'?3:tier==='TIER 3'?8:2),
      desc:'',
      materials:[''],
      steps:[''],
      tip:'',
      rubric:[{name:'Category',desc:'',d:{4:'',3:'',2:'',1:'',0:''}}]
    };
    template.id = 'u'+Date.now()+Math.random().toString(36).slice(2,6);
    template.tier = tier;
    template.name = sourceProj && sourceProj.name ? sourceProj.name+' Copy' : 'New Project';
    template.materials = Array.isArray(template.materials) ? template.materials.slice() : [''];
    template.steps = Array.isArray(template.steps) ? template.steps.slice() : [''];
    template.rubric = Array.isArray(template.rubric) ? dc(template.rubric) : [{name:'Category',desc:'',d:{4:'',3:'',2:'',1:'',0:''}}];
    return template;
  }

  function addProjectToTier(unitObj, tier){
    if (!unitObj.projects) unitObj.projects = [];
    var source = null;
    (unitObj.projects||[]).forEach(function(p){ if (!source && p.tier===tier) source = p; });
    if (!source && unitObj.projects.length) source = unitObj.projects[0];
    var proj = makeProjectTemplate(tier, source);
    unitObj.projects.push(proj);
    currProjId = proj.id;
    saveCurr();
    renderCanvas();
  }

  function addUnitToCourse(courseObj){
    if (!courseObj.units) courseObj.units = [];
    var maxNum = 0;
    courseObj.units.forEach(function(u){ maxNum = Math.max(maxNum, parseInt(u.num,10)||0); });
    var newUnit = {
      id:'u'+Date.now(),
      num:maxNum+1,
      title:'New Unit',
      overview:'',
      deadlines:{t1:'',t2:'',t3:''},
      projects:[makeProjectTemplate('TIER 1')]
    };
    courseObj.units.push(newUnit);
    currUnitId = newUnit.id;
    currProjId = newUnit.projects[0].id;
    saveCurr();
    renderCanvas();
  }

  function fieldWrap(labelText){
    var wrap = el('div','');
    wrap.style.cssText='display:flex;flex-direction:column;gap:4px;margin-bottom:10px';
    if (labelText) {
      var lab = el('div','');
      lab.style.cssText='font-size:.64rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-family:Rajdhani,sans-serif';
      lab.textContent = labelText;
      wrap.appendChild(lab);
    }
    return wrap;
  }

  function makeInput(value, onInput, opts){
    opts = opts || {};
    var node = opts.multiline ? el('textarea','') : el('input','');
    if (!opts.multiline) node.type = opts.type || 'text';
    node.value = value == null ? '' : value;
    node.placeholder = opts.placeholder || '';
    var base = 'width:100%;background:var(--s2);border:1px solid var(--br);border-radius:7px;color:var(--text);font-family:DM Sans,sans-serif;outline:none;';
    if (opts.multiline) {
      node.style.cssText = base + 'font-size:'+(opts.fontSize||'.8rem')+';padding:8px 10px;line-height:1.5;resize:vertical;min-height:'+(opts.minHeight||'68px')+';';
    } else {
      node.style.cssText = base + 'font-size:'+(opts.fontSize||'.8rem')+';padding:7px 10px;';
    }
    node.oninput = function(){ onInput(node.value); saveCurr(); };
    return node;
  }

  function addTinyBtn(parent, label, onClick, danger){
    var b = el('button','');
    b.type='button';
    b.textContent=label;
    b.style.cssText='background:'+(danger?'rgba(200,64,64,.12)':'var(--gg)')+';color:'+(danger?'var(--danger)':'var(--gold)')+';border:1px solid '+(danger?'rgba(200,64,64,.3)':'var(--gd)')+';border-radius:6px;padding:4px 8px;font-size:.68rem;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;';
    b.onclick=function(e){ e.stopPropagation(); onClick(); };
    parent.appendChild(b);
    return b;
  }

  function ensureValidSelection() {
    var course = getCourse() || curriculum[0];
    if (!course) return {course:null, unit:null, proj:null};
    currCourseId = course.id;
    var unit = getUnit(course) || course.units[0];

var FITNESS_BLOCKS = [
  { num: 1, pct: 60 },{ num: 2, pct: 65 },{ num: 3, pct: 70 },{ num: 4, pct: 75 },
  { num: 5, pct: 80 },{ num: 6, pct: 85 },{ num: 7, pct: 90 },{ num: 8, pct: 100 }
];
var FITNESS_ORM = { deadlift: 315, squat: 275, bench: 245, ohp: 155 };
var FITNESS_DAY_ORDER = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
function fitnessCalcWeight(lift, pct) {
  var base = FITNESS_ORM[lift] || 0;
  return Math.round((base * pct / 100) / 5) * 5;
}
function fitnessPyramidSets(topWeight, sets) {
  var arr = [];
  for (var i = sets - 1; i >= 0; i--) arr.push(Math.round((topWeight - i * topWeight * 0.08) / 5) * 5);
  return arr.join('-');
}
function getFitnessData(block) {
  var p = block.pct;
  var dl = fitnessCalcWeight('deadlift', p), sq = fitnessCalcWeight('squat', p), bp = fitnessCalcWeight('bench', p), ohp = fitnessCalcWeight('ohp', p);
  var runPrograms = [
    { title: 'INTERVAL RUN', desc: '4 x 800m', detail: '90 sec rest', note: 'Easy-moderate pace. Focus on form.' },

// ─── SPEECH TO TEXT ───────────────────────────────────────────────
var _recognition = null;
var _isListening = false;

function toggleMic(btn) {
  if (_isListening) {
    stopMic(btn);
  } else {
    startMic(btn);
  }
}

function startMic(btn) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setDumpStatus('Speech recognition not supported in this browser. Try Chrome.');
    return;
  }

  var recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  _recognition = recognition;

  var interimSpan = '';

  recognition.onstart = function() {
    _isListening = true;
    btn.classList.add('listening');
    btn.innerHTML = '🔴 Listening…';
    setDumpStatus('Listening — speak naturally, tap again to stop.');
  };

  recognition.onresult = function(e) {
    var final = '';
    var interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var res = e.results[i];
      if (res.isFinal) {
        final += res[0].transcript;
      } else {
        interim += res[0].transcript;
      }
    }
    if (final) {
      // Append to rich editor body
      var body = document.querySelector('#dump-outer .editor-body');
      if (body) {
        var trimmed = final.trim();
        // Insert as a new paragraph
        var p = document.createElement('p');
        p.textContent = trimmed;
        body.appendChild(p);
        // Scroll to bottom
        body.scrollTop = body.scrollHeight;
        S.dump = body.innerHTML;
        save();
      }
    }
    if (interim) {
      setDumpStatus('Hearing: ' + interim);
    }
  };

  recognition.onerror = function(e) {
    var msg = e.error === 'not-allowed'
      ? 'Mic access denied — allow microphone in browser settings.'
      : 'Mic error: ' + e.error;
    setDumpStatus(msg);
    stopMic(btn);
  };

  recognition.onend = function() {
    if (_isListening) {
      // Auto-restart if still supposed to be listening (browser stops after silence)
      try { recognition.start(); } catch(err) { stopMic(btn); }
    }
  };

  try {
    recognition.start();
  } catch(err) {
    setDumpStatus('Could not start mic: ' + err.message);
  }
}

function stopMic(btn) {
  _isListening = false;
  if (_recognition) {
    try { _recognition.stop(); } catch(e) {}
    _recognition = null;
  }
  if (btn) {
    btn.classList.remove('listening');
    btn.innerHTML = '🎙 Speak';
  }
  setDumpStatus('Done listening — review and hit ⚡ Auto-Sort when ready.');
}

function setDumpStatus(msg) {
  var st = document.getElementById('dump-status');
  if (st) st.textContent = msg;
}

async function autoSort(btn) {
  var body = document.querySelector('#dump-outer .editor-body');
  var dumpText = body ? (body.innerText || body.textContent || '').trim() : '';
  if (!dumpText) { setDumpStatus('Nothing to sort!'); return; }
  btn.disabled = true; btn.textContent = 'Reading...';
  setDumpStatus('AI is reading your dump...');
  try {
    var boxNames = 'army, teaching, coaching, art, house, personal';
    if (S.customBoxes) S.customBoxes.forEach(function(cb){ boxNames += ', ' + cb.id; });
    var sysPrompt = 'You are a life organizer for Zachary: high school art teacher, track & field head coach, Army OCS candidate, artist, game dev. His boxes: ' + boxNames + '. Read his brain dump and sort every distinct item — preserve full content verbatim, do NOT summarize or condense anything. For each item decide: which box it belongs to, and what TYPE: todo (action/task), note (info/ideas/reference/lists/details to keep in full), or project (named initiative). FORMAT RULES — todos must start with "[ ] ", notes must start with "• " and use "\n• " for sub-items, projects are just the name. Group related items into one note entry rather than splitting them. Return ONLY valid JSON no markdown: {"sorted":[{"box":"coaching","type":"todo","text":"[ ] Make coaching card 5x8 double sided"},{"box":"coaching","type":"note","text":"• Hurdle Commandments:\n• Thou shall not go over a backwards hurdle\n• Thou shall not stutter step"},{"box":"art","type":"project","text":"Dramamine Dragon Logo"}]}';
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 8000,
        system: sysPrompt, messages: [{role:'user', content: 'Brain dump:\n\n' + dumpText}] })
    });
    var data = await resp.json();
    var raw = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : '';
    raw = raw.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(raw);
    var items = parsed.sorted || [];
    if (!items.length) { setDumpStatus('Nothing recognizable.'); btn.disabled=false; btn.textContent='\u26a1 Auto-Sort'; return; }
    showSortPreview(items, btn, body);
    setDumpStatus('');
  } catch(e2) {
    console.error(e2);
    setDumpStatus('Sort failed. Check connection and try again.');
    btn.disabled=false; btn.textContent='\u26a1 Auto-Sort';
  }
}

function sendSortedToBoxes(grouped) {
  var today = new Date().toLocaleDateString();
  Object.keys(grouped).forEach(function(boxId) {
    var box = S.boxes[boxId]; if (!box) return;
    var grp = grouped[boxId];
    if (!box.tasks) box.tasks=[];
    grp.todos.forEach(function(txt){
      // Strip leading "[ ] " if present since tasks have their own checkbox UI
      var clean = txt.replace(/^\[\s*\]\s*/,'').trim();
      box.tasks.push({t:clean,d:false});
    });
    if (grp.notes.length) {
      // Convert bullet text to HTML for the rich editor
      var noteLines = ['<p><strong>--- Auto-sorted '+today+' ---</strong></p>'];
      grp.notes.forEach(function(note) {
        var lines = note.split('\n');
        lines.forEach(function(line) {
          var l = line.trim();
          if (!l) return;
          if (l.startsWith('\u2022') || l.startsWith('•')) {
            noteLines.push('<p>' + l + '</p>');
          } else {
            noteLines.push('<p>' + l + '</p>');
          }
        });
      });
      box.notes = (box.notes||'') + '\n' + noteLines.join('');
    }
    if (!box.chapters) box.chapters=[];
    grp.projects.forEach(function(name) {
      var exists=box.chapters.some(function(ch){return ch.label.toLowerCase()===name.toLowerCase();});
      var inProj=(box.projects||'').toLowerCase().indexOf(name.toLowerCase())!==-1;
      if (!exists&&!inProj) {
        box.chapters.push({
          id:'ch-'+boxId+'-'+Date.now()+Math.random().toString(36).slice(2,5),
          label:name,
          pages:[{id:'p-'+Date.now(),icon:'\ud83d\udcc4',label:'Notes',content:''}]
        });
      }
    });
  });
  save();
  setDumpStatus('\u2713 Sent to boxes! Check Tasks, Notes, and chapter tabs.');
}

// ─── RICH TEXT EDITOR ─────────────────────────────────────────────
function buildEditor(placeholder, htmlContent, onSave) {
  var wrap = el('div','editor-wrap');

  // Toolbar
  var tb = el('div','editor-toolbar');

  // Font size
  var sizeSelect = el('select','tb-select');
  sizeSelect.title = 'Font size';
  [['1','Small'],['3','Normal'],['4','Large'],['5','X-Large'],['6','Huge']].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o[0]; opt.textContent = o[1];
    if (o[0]==='3') opt.selected = true;
    sizeSelect.appendChild(opt);
  });
  sizeSelect.onchange = function() {
    document.execCommand('fontSize', false, sizeSelect.value);
    body.focus();
  };
  tb.appendChild(sizeSelect);

  var sep0 = el('div','tb-sep'); tb.appendChild(sep0);

  // Format buttons
  function tbBtn(label, cmd, val, title) {
    var btn = el('button','tb-btn');
    btn.innerHTML = label; btn.title = title || cmd;
    btn.onmousedown = function(e) {
      e.preventDefault();
      document.execCommand(cmd, false, val || null);
      body.focus();
      updateToolbarState();
    };
    tb.appendChild(btn);
    return btn;
  }

  var bBtn = tbBtn('<b>B</b>',   'bold',          null, 'Bold');
  var iBtn = tbBtn('<i>I</i>',   'italic',        null, 'Italic');
  var uBtn = tbBtn('<u>U</u>',   'underline',     null, 'Underline');
  var sBtn = tbBtn('<s>S</s>',   'strikeThrough', null, 'Strikethrough');

  var sep1 = el('div','tb-sep'); tb.appendChild(sep1);

  tbBtn('H1', 'formatBlock', 'h2', 'Heading 1');
  tbBtn('H2', 'formatBlock', 'h3', 'Heading 2');
  tbBtn('¶',  'formatBlock', 'p',  'Paragraph');

  var sep2 = el('div','tb-sep'); tb.appendChild(sep2);

  // Bullet list — works on selection too
  var ulBtn = el('button','tb-btn'); ulBtn.textContent='• List'; ulBtn.title='Convert selection to bullet list';
  ulBtn.onmousedown = function(e) {
    e.preventDefault();
    var sel = window.getSelection();
    var selText = sel ? sel.toString().trim() : '';
    if (selText && selText.indexOf('\n') !== -1) {
      var lines = selText.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
      var html = '<ul>' + lines.map(function(l){return '<li>'+l+'</li>';}).join('') + '</ul>';
      document.execCommand('insertHTML', false, html);
    } else {
      document.execCommand('insertUnorderedList', false, null);
    }
    body.focus(); updateToolbarState();
  };
  tb.appendChild(ulBtn);
  tbBtn('1. List', 'insertOrderedList', null, 'Numbered list');

  var sep3 = el('div','tb-sep'); tb.appendChild(sep3);

  // Checkbox
  var cbBtn = el('button','tb-btn');
  cbBtn.textContent = '☑ Check'; cbBtn.title = 'Convert selection to checkboxes (or insert one)';
  cbBtn.onmousedown = function(e) {
    e.preventDefault();
    var sel = window.getSelection();
    var selText = sel ? sel.toString().trim() : '';
    if (selText) {
      // Convert each selected line into a checkbox
      var lines = selText.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
      var html = lines.map(function(line) {
        var uid = 'cb' + Date.now() + Math.random().toString(36).slice(2,5);
        return '<div><input type="checkbox" id="'+uid+'"><label for="'+uid+'"> '+line+'</label></div>';
      }).join('');
      document.execCommand('insertHTML', false, html);
    } else {
      var uid = 'cb' + Date.now();
      document.execCommand('insertHTML', false,
        '<div><input type="checkbox" id="'+uid+'"><label for="'+uid+'"> &nbsp;</label></div>'
      );
    }
    body.focus();
  };
  tb.appendChild(cbBtn);

  // Table
  var tblBtn = el('button','tb-btn');
  tblBtn.textContent = '⊞ Table'; tblBtn.title = 'Insert table';
  tblBtn.onmousedown = function(e) {
    e.preventDefault();
    var rows = parseInt(prompt('Rows?', '3') || '3', 10);
    var cols = parseInt(prompt('Columns?', '3') || '3', 10);
    if (isNaN(rows)||rows<1) rows=3;
    if (isNaN(cols)||cols<1) cols=3;
    var html = '<table>';
    // Header row
    html += '<tr>';
    for (var c=0;c<cols;c++) html += '<th>Header</th>';
    html += '</tr>';
    for (var r=0;r<rows-1;r++) {
      html += '<tr>';
      for (var cc=0;cc<cols;cc++) html += '<td>&nbsp;</td>';
      html += '</tr>';
    }
    html += '</table><p><br></p>';
    document.execCommand('insertHTML', false, html);
    body.focus();
  };
  tb.appendChild(tblBtn);

  var sep4 = el('div','tb-sep'); tb.appendChild(sep4);

  tbBtn('❝ Quote', 'formatBlock', 'blockquote', 'Block quote');
  tbBtn('— Line',  'insertHorizontalRule', null, 'Horizontal rule');

  var sep5 = el('div','tb-sep'); tb.appendChild(sep5);

  // Align
  tbBtn('⬛L', 'justifyLeft',   null, 'Align left');
  tbBtn('⬛C', 'justifyCenter', null, 'Center');

  var sep6 = el('div','tb-sep'); tb.appendChild(sep6);

  tbBtn('↩ Undo', 'undo', null, 'Undo');
  tbBtn('↪ Redo', 'redo', null, 'Redo');

  // Body
  var body = el('div','editor-body');
  body.contentEditable = 'true';
  body.setAttribute('data-placeholder', placeholder || 'Start writing…');
  if (htmlContent) body.innerHTML = htmlContent;

  // Save on input
  body.oninput = function() {
    if (onSave) onSave(body.innerHTML);
  };

  // Update toolbar bold/italic state on selection change
  function updateToolbarState() {
    bBtn.classList.toggle('on', document.queryCommandState('bold'));
    iBtn.classList.toggle('on', document.queryCommandState('italic'));
    uBtn.classList.toggle('on', document.queryCommandState('underline'));
    sBtn.classList.toggle('on', document.queryCommandState('strikeThrough'));
  }
  body.addEventListener('keyup', updateToolbarState);
  body.addEventListener('mouseup', updateToolbarState);
  body.addEventListener('keydown', function(e) {
    // Find if cursor is inside a checkbox row
    function getCheckboxRow() {
      var sel = window.getSelection();
      if (!sel || !sel.rangeCount) return null;
      var node = sel.getRangeAt(0).startContainer;
      while (node && node !== body) {
        if (node.nodeType === 1 && node.tagName === 'DIV') {
          var cb = node.querySelector('input[type=checkbox]');
          if (cb) return node;
        }
        node = node.parentNode;
      }
      return null;
    }

    if (e.key === 'Enter') {
      var row = getCheckboxRow();
      if (row) {
        e.preventDefault();
        // Get current indent
        var currentPad = parseInt(row.style.paddingLeft) || 0;
        var uid = 'cb' + Date.now();
        var newRow = document.createElement('div');
        newRow.style.paddingLeft = currentPad ? currentPad + 'px' : '';
        newRow.innerHTML = '<input type="checkbox" id="' + uid + '"><label for="' + uid + '"> \u00a0</label>';
        row.parentNode.insertBefore(newRow, row.nextSibling);
        // Place cursor in new row's label
        var label = newRow.querySelector('label');
        var range = document.createRange();
        var sel2 = window.getSelection();
        range.setStart(label, label.childNodes.length);
        range.collapse(true);
        sel2.removeAllRanges();
        sel2.addRange(range);
        return;
      }
    }

    if (e.key === 'Tab') {
      e.preventDefault();
      var row = getCheckboxRow();
      if (row) {
        // Indent/outdent the checkbox row
        var cur = parseInt(row.style.paddingLeft) || 0;
        var next = e.shiftKey ? Math.max(0, cur - 24) : cur + 24;
        row.style.paddingLeft = next > 0 ? next + 'px' : '';
      } else {
        document.execCommand('insertHTML', false, e.shiftKey ? '' : '\u00a0\u00a0\u00a0\u00a0');
      }
    }
  });

  wrap.appendChild(tb);
  wrap.appendChild(body);
  return {wrap: wrap, body: body};
}

// Helper: convert plain text to basic HTML (preserve newlines)
function textToHtml(txt) {
  if (!txt) return '';
  // If it already looks like HTML, return as-is
  if (txt.indexOf('<') !== -1) return txt;
  return txt.split('\n').map(function(line) {
    return '<p>' + (line.trim() ? line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '<br>') + '</p>';
  }).join('');
}

      var lb=el('label',item.d?'done':''); lb.htmlFor=uid; lb.appendChild(tx(item.t));
      cb.onchange=(function(it,l){return function(){it.d=cb.checked;l.className=it.d?'done':'';save();};})(item,lb);
      row.appendChild(cb); row.appendChild(lb); g.appendChild(row);
      if(item.c&&item.c.length) g.appendChild(buildRows(item.c,depth+1));
    });
    return g;
  }
  wrap.appendChild(buildRows(box.tracker,0));
  cv.appendChild(wrap);
}

// ─── CHAPTER PAGE ─────────────────────────────────────────────────
// ─── RAMHAUS WHEEL ───────────────────────────────────────────────
function renderRamhaus(cv, meta, box, ch) {
  cv.innerHTML = '';
  cv.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:row;flex:1;height:100%';

  // ── LEFT: Wheel panel ──

  var title = el('div','pg-h1');

  title.appendChild(tx('Ramhaus'));
  var sub = el('div','pg-sub');
  sub.appendChild(tx('Next Year — Bauhaus-inspired teaching wheel'));
  leftPanel.appendChild(title);
  leftPanel.appendChild(sub);

  // Canvas container
  var wheelWrap = el('div','');
  wheelWrap.style.cssText = 'position:relative;width:100%;max-width:580px;margin:0 auto';
  var wheelCanvas = document.createElement('canvas');
  wheelCanvas.style.cssText = 'display:block;width:100%;cursor:pointer';
  wheelWrap.appendChild(wheelCanvas);
  var tooltip = el('div','');
  tooltip.style.cssText = 'position:absolute;background:var(--s2);border:1px solid var(--br2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);max-width:215px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:99;line-height:1.5;box-shadow:0 2px 12px rgba(0,0,0,.4)';
  wheelWrap.appendChild(tooltip);
  leftPanel.appendChild(wheelWrap);

  // Legend
  var legend = el('div','');
  legend.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin:10px 16px 2px;font-size:11px;color:var(--mid)';
  var legendItems = [
    {color:'#1a3d6b',label:'Ways of Working'},
    {color:'#7a3020',label:'Mediums'},
    {color:'#1e5c34',label:'Elements & Principles'},
    {color:'#5e2d80',label:'Free Expression'},
  ];
  legendItems.forEach(function(li) {
    var item = el('div',''); item.style.cssText='display:flex;align-items:center;gap:5px';
    var dot = el('div',''); dot.style.cssText='width:10px;height:10px;border-radius:50%;flex-shrink:0;background:'+li.color;
    var lbl = el('span',''); lbl.textContent=li.label;
