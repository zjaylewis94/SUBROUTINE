<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Subroutine</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f0e0d; --s1:#161412; --s2:#1e1b18; --s3:#252220;
  --br:#2a2622; --br2:#342e28;
  --gold:#e8a030; --gd:#9a6010; --gg:rgba(232,160,48,.09);
  --text:#eee8e0; --mid:#b0a89e; --dim:#605850; --danger:#c84040; --ok:#5cb87a;
  --army:#5cb87a; --teaching:#e07840; --coaching:#38bcd4;
  --art:#c87de0; --house:#4da6ff; --personal:#a09ab8; --lists:#f0c040;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── TOPBAR ── */
#topbar{height:48px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 16px;gap:14px;z-index:60}
#logo{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;
  color:var(--gold);text-transform:uppercase;cursor:pointer;white-space:nowrap}
#tb-date{font-size:.7rem;color:var(--dim);letter-spacing:.5px}
#tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#reset-btn{background:none;border:1px solid var(--br);border-radius:5px;color:var(--dim);font-family:Rajdhani,sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1px;padding:4px 10px;cursor:pointer;transition:all .15s}
#reset-btn:hover{border-color:var(--danger);color:var(--danger)}
#export-btn,#import-btn{background:none;border:1px solid var(--br);border-radius:5px;color:var(--dim);font-family:Rajdhani,sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1px;padding:4px 10px;cursor:pointer;transition:all .15s}
#export-btn:hover,#import-btn:hover{border-color:var(--gold);color:var(--gold)}
#map-toggle{display:none;gap:3px;background:var(--s2);border:1px solid var(--br);border-radius:7px;padding:3px}
#map-toggle.show{display:flex}
.mt-btn{background:none;border:none;color:var(--dim);font-family:'Rajdhani',sans-serif;
  font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s}
.mt-btn.on{background:var(--s1);color:var(--gold)}
#hbg{display:none;background:none;border:none;color:var(--mid);font-size:1.3rem;cursor:pointer;padding:2px 8px}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden}

/* ── LEFT SIDEBAR ── */
#sb{width:196px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--br);
  display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;z-index:30}
#sb-inner{flex:1;overflow-y:auto;padding:10px 0 24px}
#sb-inner::-webkit-scrollbar{width:3px}
#sb-inner::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.sb-sec{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:14px 14px 5px}
.sb-row{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;
  border-left:3px solid transparent;border-radius:0 6px 6px 0;margin-right:8px;
  transition:background .15s,border-color .15s;user-select:none}
.sb-row:hover{background:var(--s2)}
.sb-row.on{background:var(--s2);border-left-color:var(--rc,var(--gold))}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--rc,var(--gold));flex-shrink:0}
.sb-lbl{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--dim);transition:color .15s}
.sb-row.on .sb-lbl,.sb-row:hover .sb-lbl{color:var(--text)}

/* ── MAIN (center + right) ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TAB BAR (top — projects/chapters) ── */
#tab-bar{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--br);
  display:flex;align-items:stretch;overflow-x:auto;min-height:40px}
#tab-bar::-webkit-scrollbar{height:0}
.tab-pill{display:flex;align-items:center;gap:5px;padding:0 15px;cursor:pointer;
  white-space:nowrap;font-family:'Rajdhani',sans-serif;font-size:.74rem;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);border:none;background:none;
  border-bottom:2px solid transparent;transition:all .15s;position:relative;top:1px;height:40px}
.tab-pill:hover{color:var(--text);background:var(--s2)}
.tab-pill.on{color:var(--text);border-bottom-color:var(--rc,var(--gold))}
.tab-dot{width:5px;height:5px;border-radius:50%;background:var(--rc,var(--gold))}
.tab-add{display:flex;align-items:center;padding:0 12px;cursor:pointer;color:var(--dim);
  font-size:1rem;transition:color .15s;border:none;background:none;height:40px}
.tab-add:hover{color:var(--gold)}

/* ── BODY ROW (canvas + right sidebar) ── */
#body-row{display:flex;flex:1;overflow:hidden}

/* ── CANVAS ── */
#canvas{flex:1;overflow-y:auto;padding:32px 40px;min-width:0}
#canvas::-webkit-scrollbar{width:4px}
#canvas::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
#canvas.nopad{padding:0;overflow:hidden}

/* ── RIGHT SIDEBAR (pages/sections) ── */
#rsb{width:180px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--br);
  display:flex;flex-direction:column;overflow:hidden}
#rsb.hidden{display:none}

#sb,#rsb{position:relative;min-width:0}
.sidebar-resize{position:absolute;top:0;bottom:0;width:8px;z-index:40;background:transparent}
#sb-resize{right:-4px;cursor:col-resize}
#rsb-resize{left:-4px;cursor:col-resize}
.sidebar-resize:hover,.sidebar-resize.dragging{background:rgba(232,160,48,.14)}
.sidebar-collapse{position:absolute;top:8px;width:22px;height:22px;border-radius:6px;border:1px solid var(--br);background:var(--s2);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:41;font-size:.72rem;transition:all .15s}
.sidebar-collapse:hover{color:var(--gold);border-color:var(--gd);background:var(--s3)}
#sb-collapse{right:8px}
#rsb-collapse{left:8px}
#sb.collapsed{width:14px!important;border-right:none;overflow:visible}
#sb.collapsed #sb-inner,#sb.collapsed #sb-resize{opacity:0;pointer-events:none}
#sb.collapsed .sidebar-collapse{opacity:1;pointer-events:auto;right:-28px}
#rsb.collapsed{width:14px!important;border-left:none;overflow:visible}
#rsb.collapsed #rsb-head,#rsb.collapsed #rsb-scroll,#rsb.collapsed #rsb-add-btn,#rsb.collapsed #rsb-resize{opacity:0;pointer-events:none}
#rsb.collapsed .sidebar-collapse{opacity:1;pointer-events:auto;left:-28px}
#layout.dragging-sidebars,#layout.dragging-sidebars *{cursor:col-resize!important;user-select:none!important}
@media(max-width:900px){#sb-resize,#rsb-resize,#sb-collapse,#rsb-collapse{display:none!important}}
#rsb-head{padding:10px 14px 6px;flex-shrink:0}
#rsb-head-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
#rsb-scroll{flex:1;overflow-y:auto;padding:0 0 20px}
#rsb-scroll::-webkit-scrollbar{width:3px}
#rsb-scroll::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.rp-row{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;
  border-right:3px solid transparent;transition:background .15s,border-color .15s;
  user-select:none}
.rp-row:hover{background:var(--s2)}
.rp-row.on{background:var(--s2);border-right-color:var(--rc,var(--gold))}
.rp-icon{font-size:.8rem;flex-shrink:0}
.rp-lbl{font-size:.76rem;color:var(--dim);flex:1;transition:color .15s;line-height:1.3}
.rp-row.on .rp-lbl,.rp-row:hover .rp-lbl{color:var(--text)}
.rp-del{background:none;border:none;color:transparent;cursor:pointer;font-size:.7rem;
  padding:1px 3px;transition:color .15s}
.rp-row:hover .rp-del{color:var(--dim)}
.rp-row.drag-over{background:var(--s3);border-right-color:var(--gold)!important}
#rsb-add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;
  color:var(--dim);font-size:.74rem;border:none;background:none;width:100%;
  transition:color .15s}
#rsb-add-btn:hover{color:var(--gold)}

/* ── PAGE TITLES ── */
.pg-h1{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:2px;margin-bottom:3px}
.pg-sub{font-size:.7rem;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:22px}
.pg-h2{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:1px;
  color:var(--text);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--br)}

/* ── RICH TEXT EDITOR ── */
.editor-wrap{display:flex;flex-direction:column;gap:0;background:transparent}
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:6px 4px;background:var(--s1);
  border-bottom:1px solid var(--br);flex-wrap:wrap;position:sticky;top:0;z-index:10;
  margin:0 -40px;padding-left:40px;padding-right:40px}
.tb-btn{background:none;border:1px solid transparent;border-radius:5px;color:var(--mid);
  font-size:.8rem;padding:4px 7px;cursor:pointer;transition:all .15s;white-space:nowrap;
  font-family:'DM Sans',sans-serif;line-height:1}
.tb-btn:hover{background:var(--s3);color:var(--text);border-color:var(--br)}
.tb-btn.on{background:var(--s3);color:var(--gold);border-color:var(--gd)}
.tb-sep{width:1px;height:18px;background:var(--br);margin:0 4px;flex-shrink:0}
.tb-select{background:var(--s2);border:1px solid var(--br);border-radius:5px;color:var(--mid);
  font-family:'DM Sans',sans-serif;font-size:.76rem;padding:3px 6px;outline:none;cursor:pointer}
.tb-select:focus{border-color:var(--gold)}
.editor-body{min-height:calc(100vh - 180px);padding:28px 0;outline:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.95rem;line-height:1.9;
  caret-color:var(--gold)}
.editor-body:empty:before{content:attr(data-placeholder);color:var(--dim);pointer-events:none}
.editor-body table{border-collapse:collapse;width:100%;margin:10px 0}
.editor-body td,.editor-body th{border:1px solid var(--br);padding:7px 10px;min-width:80px;vertical-align:top}
.editor-body th{background:var(--s2);font-weight:600;font-size:.82rem}
.editor-body input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer;margin-right:6px;vertical-align:middle}
.editor-body ul,.editor-body ol{padding-left:24px}
.editor-body blockquote{border-left:3px solid var(--gold);margin:4px 0;padding:4px 12px;color:var(--mid)}

#dump-status{font-size:.7rem;color:var(--dim);padding:8px 40px 16px;font-style:italic;flex-shrink:0}
.open-ta{width:100%;min-height:320px;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;line-height:1.9;
  resize:none;caret-color:var(--gold)}
.open-ta::placeholder{color:var(--dim)}

/* ── BRAIN DUMP ── */
#dump-outer{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
#dump-doc-hdr{flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--dim);
  padding:12px 40px 10px;border-bottom:1px solid var(--br);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s1);position:sticky;top:0;z-index:10}
#dump-sort-btn{background:var(--gold);color:#000;border:none;border-radius:5px;
  font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;
  letter-spacing:1px;padding:5px 12px;cursor:pointer;transition:opacity .15s}
#dump-sort-btn:hover{opacity:.82}
#dump-sort-btn:disabled{opacity:.4;cursor:default}
#ta-dump{display:none} /* replaced by rich editor */
#dump-status{font-size:.7rem;color:var(--dim);padding:4px 40px 12px;font-style:italic;flex-shrink:0}
/* dump toolbar overrides — dark bg */
#dump-outer .editor-toolbar{background:var(--s1);margin:0;padding:6px 40px;border-bottom:1px solid var(--br)}
#dump-outer .editor-body{background:var(--bg);padding:28px 40px;min-height:calc(100vh - 140px);color:var(--text)}
#dump-mic-btn{background:none;border:1px solid var(--br);border-radius:5px;
  color:var(--dim);font-size:.88rem;padding:4px 10px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:5px;
  font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1px}
#dump-mic-btn:hover{border-color:var(--mid);color:var(--text)}
#dump-mic-btn.listening{border-color:#e05a5a;color:#e05a5a;background:rgba(224,90,90,.08);
  animation:mic-pulse 1.2s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,90,90,.3)}50%{box-shadow:0 0 0 6px rgba(224,90,90,0)}}

/* ── CHECKLIST ── */
.cl-wrap{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cl-child{margin-left:22px}
.cl-row{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:8px;
  background:var(--s1);border:1px solid var(--br);transition:background .12s}
.cl-row:hover{background:var(--s2)}
.cl-row input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.cl-row label{flex:1;font-size:.83rem;color:var(--mid);cursor:pointer;line-height:1.4}
.cl-row label.done{text-decoration:line-through;color:var(--dim)}
.cl-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.72rem;padding:2px 5px;transition:color .12s}
.cl-del:hover{color:var(--danger)}

/* ── ADD ROW ── */
.add-row{display:flex;gap:7px;margin-top:6px}
.add-inp{flex:1;background:var(--s1);border:1px solid var(--br);border-radius:8px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;
  padding:8px 12px;outline:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--gold)}
.add-inp::placeholder{color:var(--dim)}
.add-btn{background:var(--gg);color:var(--gold);border:1px solid var(--gd);border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1px;
  padding:8px 13px;cursor:pointer;transition:background .15s;white-space:nowrap}
.add-btn:hover{background:rgba(232,160,48,.16)}
.ghost-btn{background:none;border:1px solid var(--br);border-radius:8px;color:var(--dim);
  font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1px;
  padding:8px 14px;cursor:pointer;transition:all .15s}
.ghost-btn:hover{color:var(--text);border-color:var(--mid)}

/* ── SECTION LABEL ── */
.sh{font-family:'Rajdhani',sans-serif;font-size:.67rem;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--dim);margin-bottom:8px;margin-top:20px;
  padding-bottom:5px;border-bottom:1px solid var(--br)}
.sh:first-of-type{margin-top:0}

/* ── PROGRESS ── */
.prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.prog-bar{flex:1;background:var(--s2);border-radius:4px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.prog-lbl{font-size:.7rem;color:var(--dim);white-space:nowrap}

/* ── WISH TAG ── */
.wpri{font-size:.6rem;font-weight:600;letter-spacing:.5px;padding:2px 7px;border-radius:8px;
  text-transform:uppercase;border:1px solid var(--br);color:var(--dim);background:none;cursor:pointer}
.wpri.high{border-color:#c84040;color:#c84040;background:rgba(200,64,64,.1)}
.wpri.med{border-color:var(--gold);color:var(--gold);background:rgba(232,160,48,.1)}
.reset-note{font-size:.7rem;color:var(--dim);font-style:italic;margin-bottom:14px}

/* ── CARD GRID (overview) ── */
#card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px;padding:28px 36px}
.bcard{background:var(--s1);border:1px solid var(--br);border-radius:12px;overflow:hidden;
  border-top:3px solid var(--rc,var(--gold));transition:transform .15s}
.bcard:hover{transform:translateY(-1px)}
.bc-head{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;cursor:pointer;user-select:none}
.bc-ico{font-size:1.25rem}
.bc-name{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text);flex:1}
.bc-counts{font-size:.68rem;color:var(--dim);text-align:right;line-height:1.7}
.bc-counts b{color:var(--text)}
.bc-arr{font-size:.6rem;color:var(--dim);transition:transform .2s;margin-left:4px}
.bc-arr.open{transform:rotate(180deg)}
.bc-body{display:none;border-top:1px solid var(--br)}
.bc-body.open{display:block}
.bc-sec-lbl{font-family:'Rajdhani',sans-serif;font-size:.63rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:9px 14px 5px;border-bottom:1px solid var(--br)}
.bc-items{padding:5px 8px 8px;display:flex;flex-direction:column;gap:2px}
.bc-task-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;transition:background .12s}
.bc-task-row:hover{background:var(--s2)}
.bc-task-row input{width:13px;height:13px;flex-shrink:0;cursor:pointer}
.bc-task-row label{font-size:.79rem;color:var(--mid);cursor:pointer;flex:1}
.bc-task-row label.done{text-decoration:line-through;color:var(--dim)}
.bc-proj-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px}
.bc-proj-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0}
.bc-proj-name{font-size:.79rem;color:var(--mid);flex:1}
.bc-proj-tag{font-size:.58rem;font-weight:600;letter-spacing:.5px;padding:1px 6px;
  border-radius:7px;text-transform:uppercase;background:rgba(92,184,122,.12);color:var(--ok)}
.bc-empty{font-size:.75rem;color:var(--dim);padding:7px 8px 9px;font-style:italic}
.bc-add{display:flex;gap:5px;padding:5px 8px 10px}
.bc-add input{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:6px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.76rem;padding:5px 9px;outline:none;transition:border-color .2s}
.bc-add input:focus{border-color:var(--gold)}
.bc-add input::placeholder{color:var(--dim)}
.bc-add button{background:var(--gg);color:var(--gold);border:1px solid var(--gd);
  border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:1px;padding:5px 9px;cursor:pointer}
.bc-goto{display:block;width:100%;padding:8px;background:none;border:none;
  border-top:1px solid var(--br);color:var(--dim);font-family:'Rajdhani',sans-serif;
  font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s}
.bc-goto:hover{color:var(--gold);background:var(--s2)}

/* ── MIND MAP ── */
#mm-wrap{position:relative;width:100%;height:100%;overflow:hidden;background:var(--bg);
  background-image:radial-gradient(circle,var(--br) 1px,transparent 1px);background-size:28px 28px}
#mm-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#mm-nodes{position:absolute;inset:0}
.mm-center{position:absolute;transform:translate(-50%,-50%);background:var(--gold);color:#000;
  font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:11px 18px;border-radius:10px;
  box-shadow:0 0 28px rgba(232,160,48,.28);white-space:nowrap;pointer-events:none}
.mm-node{position:absolute;transform:translate(-50%,-50%);background:var(--s1);
  border:2px solid var(--nc,var(--br));border-radius:12px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;min-width:130px;
  box-shadow:0 2px 12px rgba(0,0,0,.5);overflow:hidden}
.mm-node:hover{transform:translate(-50%,-50%) scale(1.04);box-shadow:0 4px 20px rgba(0,0,0,.6)}
.mm-node-top{padding:10px 14px;text-align:center}
.mm-node-ico{font-size:1.1rem;margin-bottom:3px}
.mm-node-lbl{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--text)}
.mm-node-meta{font-size:.64rem;color:var(--dim);margin-top:2px}
.mm-node-arr{font-size:.55rem;color:var(--dim);margin-top:3px;transition:transform .2s}
.mm-node-arr.open{transform:rotate(180deg)}
.mm-node-body{display:none;border-top:1px solid var(--br);background:var(--s2);
  text-align:left;max-height:180px;overflow-y:auto}
.mm-node-body.open{display:block}
.mm-nb-sec{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);
  padding:7px 10px 3px;border-bottom:1px solid var(--br)}
.mm-nb-item{display:flex;align-items:center;gap:6px;padding:4px 10px}
.mm-nb-item input{width:11px;height:11px;flex-shrink:0;cursor:pointer}
.mm-nb-item label{font-size:.72rem;color:var(--mid);flex:1;cursor:pointer;line-height:1.3}
.mm-nb-item label.done{text-decoration:line-through;color:var(--dim)}
.mm-nb-empty{font-size:.7rem;color:var(--dim);padding:6px 10px;font-style:italic}
.mm-nb-goto{display:block;width:100%;padding:6px 10px;background:none;border:none;
  border-top:1px solid var(--br);color:var(--dim);font-family:'Rajdhani',sans-serif;
  font-size:.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;text-align:center}
.mm-nb-goto:hover{color:var(--gold);background:var(--s3)}

/* ── DRAGGABLE TABS ── */
.tab-pill.drag-over{background:var(--s3);border-bottom-color:var(--gold)!important}
.tab-pill.dragging-tab{opacity:.35;cursor:grabbing}

/* ── PROJECT CARDS ── */
.proj-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.proj-card{background:var(--s1);border:1px solid var(--br);border-radius:10px;
  padding:14px 16px;transition:border-color .15s,background .12s;
  border-left:3px solid var(--pc,var(--br))}
.proj-card:hover{background:var(--s2);border-color:var(--pc,var(--br))}
.proj-card-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.proj-card-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  letter-spacing:.5px;color:var(--text);flex:1;cursor:pointer;transition:color .15s}
.proj-card-name:hover{color:var(--gold);text-decoration:underline}
.proj-status-btn{font-size:.62rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:12px;border:none;cursor:pointer;transition:all .15s;flex-shrink:0}
.ps-active  {background:rgba(92,184,122,.15);color:#5cb87a}
.ps-active:hover{background:rgba(92,184,122,.28)}
.ps-planning{background:rgba(232,160,48,.15);color:#e8a030}
.ps-planning:hover{background:rgba(232,160,48,.28)}
.ps-paused  {background:rgba(150,150,150,.12);color:#888}
.ps-paused:hover{background:rgba(150,150,150,.22)}
.ps-someday {background:rgba(140,120,190,.12);color:#a090c8}
.ps-someday:hover{background:rgba(140,120,190,.22)}
.proj-card-desc{font-size:.78rem;color:var(--dim);line-height:1.5}

/* ── CALENDAR ── */
#cal-wrap{display:flex;flex-direction:column;height:100%;padding:24px 32px;overflow-y:auto}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-shrink:0}
.cal-title{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text);flex:1}
.cal-nav-btn{background:none;border:1px solid var(--br);border-radius:6px;color:var(--mid);
  font-size:.8rem;padding:5px 12px;cursor:pointer;transition:all .15s;
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px}
.cal-nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.cal-today-btn{background:var(--gold-g,rgba(232,160,48,.09));color:var(--gold);
  border-color:var(--gd)}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;
  background:var(--br);border:1px solid var(--br);border-radius:10px;overflow:hidden;flex-shrink:0}
.cal-dow{background:var(--s2);padding:8px 4px;text-align:center;
  font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.cal-day{background:var(--s1);min-height:96px;padding:6px 8px;position:relative;
  vertical-align:top;transition:background .12s;cursor:pointer}
.cal-day:hover{background:var(--s2)}
.cal-day.other-month{background:var(--bg)}
.cal-day.today{background:var(--s2)}
.cal-day.today .cal-day-num{color:var(--gold);font-weight:700}
.cal-day-num{font-size:.76rem;color:var(--dim);margin-bottom:4px;line-height:1}
.cal-events{display:flex;flex-direction:column;gap:2px}
.cal-lanes{position:absolute;left:0;right:0;top:22px;bottom:0;pointer-events:none}
.cal-event{position:absolute;left:0;right:0;height:18px;border-radius:4px;padding:1px 5px;
  color:#fff;cursor:grab;user-select:none;overflow:hidden;transition:opacity .15s;
  pointer-events:all;display:flex;align-items:center}
.cal-event:hover{opacity:.85;z-index:5}
.cal-event.dragging{opacity:.4;cursor:grabbing}
.cal-event-resize{position:absolute;right:0;top:0;bottom:0;width:8px;
  cursor:ew-resize;background:rgba(255,255,255,.25);border-radius:0 4px 4px 0;flex-shrink:0}
.cal-add-hint{font-size:.65rem;color:var(--dim);position:absolute;bottom:4px;left:8px;display:none}
.cal-day:hover .cal-add-hint{display:block}

/* ── WEEKLY PAGE ── */
#weekly-page{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding:24px 28px;gap:20px}
#weekly-page::-webkit-scrollbar{width:4px}
#weekly-page::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}

.wk-nav{display:flex;align-items:center;gap:8px}
.wk-nav-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);flex:1;text-align:center}

/* Goals section */
.wk-goals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.wk-goal{display:flex;flex-direction:column;gap:6px;background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:14px;border-top:3px solid var(--gold)}
.wk-goal-num{font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.wk-goal-inp{background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;line-height:1.6;resize:none;width:100%;caret-color:var(--gold);min-height:54px}
.wk-goal-inp::placeholder{color:var(--dim)}
.wk-goal-done{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:.72rem;color:var(--dim);cursor:pointer;user-select:none}
.wk-goal-done input{accent-color:var(--gold);cursor:pointer}

/* Day grid */
.wk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wk-day{display:flex;flex-direction:column;gap:6px;background:var(--s1);border:1px solid var(--br);border-radius:10px;overflow:hidden;min-height:200px}
.wk-day.today-col{border-color:var(--gold);background:var(--s2)}
.wk-day-hdr{padding:10px 12px 8px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;background:var(--s2)}
.wk-day.today-col .wk-day-hdr{background:rgba(232,160,48,.06)}
.wk-day-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);flex:1}
.wk-day.today-col .wk-day-name{color:var(--gold)}
.wk-day-num{font-size:.78rem;font-weight:600;color:var(--dim);flex-shrink:0}
.wk-day.today-col .wk-day-num{color:var(--gold)}
.wk-day-weekend-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:1px;color:var(--dim);margin-left:auto}
.wk-day-body{flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.wk-day-body::-webkit-scrollbar{width:2px}
.wk-day-body::-webkit-scrollbar-thumb{background:var(--br2)}
.wk-task{display:flex;align-items:flex-start;gap:6px;font-size:.76rem;color:var(--mid);line-height:1.4;padding:3px 4px;border-radius:5px;transition:background .12s}
.wk-task:hover{background:var(--s3)}
.wk-task input[type=checkbox]{accent-color:var(--gold);width:12px;height:12px;flex-shrink:0;margin-top:2px;cursor:pointer}
.wk-task label{flex:1;cursor:pointer}
.wk-task label.done{text-decoration:line-through;color:var(--dim)}
.wk-task-domain-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.wk-day-add{display:flex;gap:4px;padding:4px 8px 8px;flex-shrink:0}
.wk-day-add input{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.72rem;padding:4px 7px;outline:none;transition:border-color .2s}
.wk-day-add input:focus{border-color:var(--gold)}
.wk-day-add input::placeholder{color:var(--dim)}
.wk-day-add button{background:none;border:1px solid var(--br);border-radius:5px;color:var(--dim);font-size:.68rem;padding:3px 7px;cursor:pointer;transition:all .12s;white-space:nowrap}
.wk-day-add button:hover{border-color:var(--gold-d);color:var(--gold)}

/* Cal events strip in weekly */
.wk-cal-events{padding:0 8px 4px;display:flex;flex-direction:column;gap:2px}
.wk-cal-ev{font-size:.66rem;padding:2px 5px;border-radius:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Weekly section label */
.wk-section-label{font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding-bottom:5px;border-bottom:1px solid var(--br)}
@media(max-width:700px){.wk-grid{grid-template-columns:repeat(2,1fr)}.wk-goals{grid-template-columns:1fr}}

/* ── CURRICULUM ── */
#curr-wrap{display:flex;height:100%;overflow:hidden;position:relative}
#curr-left{width:230px;flex-shrink:0;border-right:1px solid var(--br);overflow-y:auto;background:var(--s1);position:relative;overflow-x:visible}
#curr-left::-webkit-scrollbar{width:3px}
#curr-left::-webkit-scrollbar-thumb{background:var(--br2)}
#curr-main{flex:1;overflow-y:auto;padding:24px 28px}
#curr-main::-webkit-scrollbar{width:4px}
#curr-main::-webkit-scrollbar-thumb{background:var(--br2)}
.curr-course-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .12s;font-family:inherit}
.curr-course-btn:hover{background:var(--s2)}
.curr-course-btn.on{border-left-color:var(--cc,var(--teaching));background:var(--s2)}
.curr-course-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.curr-course-lbl{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text)}
.curr-unit-btn{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 24px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .12s;font-family:inherit}
.curr-unit-btn:hover{background:var(--s2)}
.curr-unit-btn.on{background:var(--s2);border-left-color:var(--cc,var(--teaching))}
.curr-unit-lbl{font-size:.76rem;color:var(--dim);transition:color .12s;line-height:1.3}
.curr-unit-btn.on .curr-unit-lbl,.curr-unit-btn:hover .curr-unit-lbl{color:var(--text)}
.curr-proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:20px}
.curr-proj-card{background:var(--s1);border:1px solid var(--br);border-radius:10px;border-left:3px solid var(--tc,var(--br));cursor:pointer;padding:13px 15px;transition:all .15s}
.curr-proj-card:hover{background:var(--s2)}
.curr-proj-card.on{background:var(--s2);border-color:var(--tc);outline:1px solid var(--tc)}
.curr-proj-name{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.5px;color:var(--text);margin-bottom:3px}
.curr-proj-meta{font-size:.68rem;color:var(--dim)}
#curr-detail{width:400px;flex-shrink:0;border-left:1px solid var(--br);overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow-x:visible}
#curr-detail::-webkit-scrollbar{width:3px}
#curr-detail::-webkit-scrollbar-thumb{background:var(--br2)}
.curr-detail-hdr{background:var(--s2);padding:16px;border-bottom:1px solid var(--br);flex-shrink:0}
.curr-sidebar-resize{position:absolute;top:0;bottom:0;width:8px;z-index:12;background:transparent}
#curr-left-resize{right:-4px;cursor:col-resize}
#curr-detail-resize{left:-4px;cursor:col-resize}
.curr-sidebar-resize:hover,.curr-sidebar-resize.dragging{background:rgba(232,160,48,.14)}
.curr-sidebar-collapse{position:absolute;top:8px;width:22px;height:22px;border-radius:6px;border:1px solid var(--br);background:var(--s2);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:13;font-size:.72rem;transition:all .15s}
.curr-sidebar-collapse:hover{color:var(--gold);border-color:var(--gd);background:var(--s3)}
#curr-left-collapse{right:8px}
#curr-detail-collapse{left:8px}
#curr-left.collapsed{width:26px!important;min-width:26px;overflow:visible}
#curr-left.collapsed > :not(#curr-left-collapse):not(#curr-left-resize){opacity:0;pointer-events:none}
#curr-left.collapsed #curr-left-collapse{right:-28px}
#curr-detail.collapsed{width:26px!important;min-width:26px;overflow:visible}
#curr-detail.collapsed > :not(#curr-detail-collapse):not(#curr-detail-resize){opacity:0;pointer-events:none}
#curr-detail.collapsed #curr-detail-collapse{left:-28px}
#curr-wrap.dragging-curr-sidebars,#curr-wrap.dragging-curr-sidebars *{cursor:col-resize!important;user-select:none!important}
.curr-detail-tier{display:inline-block;border-radius:6px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:8px}
.curr-detail-name{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:6px}
.curr-detail-desc{font-size:.79rem;color:var(--mid);line-height:1.6}
.curr-pts-badge{float:right;background:var(--s1);border:1px solid var(--br);border-radius:8px;padding:6px 12px;text-align:center;margin-left:12px}
.curr-pts-num{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--text);line-height:1}
.curr-pts-lbl{font-size:.6rem;color:var(--dim)}
.curr-detail-body{padding:16px;flex:1;overflow-y:auto}
.curr-detail-body::-webkit-scrollbar{width:3px}
.curr-sec-label{font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--br);padding-bottom:5px;margin-bottom:10px;margin-top:18px}
.curr-sec-label:first-child{margin-top:0}
.curr-mat-chip{display:inline-block;background:var(--s2);border:1px solid var(--br);border-radius:20px;padding:3px 10px;font-size:.71rem;color:var(--mid);margin:0 4px 4px 0}
.curr-step{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start}
.curr-step-num{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#fff}
.curr-step-txt{font-size:.79rem;color:var(--mid);line-height:1.5;padding-top:2px;flex:1}
.curr-tip{background:var(--s2);border-left:3px solid var(--gold);border-radius:4px;padding:10px 12px;margin-top:4px}
.curr-tip-lbl{font-size:.62rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.curr-tip-txt{font-size:.77rem;color:var(--mid);line-height:1.5;font-style:italic}
.curr-rubric-tbl{width:100%;border-collapse:collapse;font-size:.7rem;margin-bottom:10px}
.curr-rubric-tbl th{padding:5px 7px;text-align:center;color:#fff;font-weight:700;font-size:.68rem}
.curr-rubric-tbl td{padding:5px 7px;border-bottom:1px solid var(--br);vertical-align:top;color:var(--dim);line-height:1.4}
.curr-rubric-tbl tr:nth-child(even) td{background:var(--s1)}
.curr-rubric-cat{font-weight:600;color:var(--text);font-size:.73rem}
.curr-rubric-sub{font-size:.64rem;color:var(--dim);font-weight:400;margin-top:1px}
@media(max-width:900px){#curr-detail{display:none}#curr-left-resize,#curr-detail-resize,#curr-left-collapse,#curr-detail-collapse{display:none!important}}

/* ── DAILY PAGE ── */
#daily-page{display:flex;flex:1;overflow:hidden}
/* Left = journal + scheduler stacked */
#daily-left{width:300px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--br);padding:20px 18px;display:flex;flex-direction:column;gap:16px}
#daily-left::-webkit-scrollbar{width:3px}
#daily-left::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
/* Middle = scheduler */
#daily-middle{width:240px;flex-shrink:0;border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
/* Right = tasks by box — large */
#daily-right{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
#daily-right::-webkit-scrollbar{width:3px}
#daily-right::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}

/* Daily nav */
.daily-nav{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.daily-nav-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);flex:1}
.daily-nav-sub{font-size:.7rem;color:var(--dim);letter-spacing:.5px;margin-bottom:14px}

/* Journal sections */
.dj-section{display:flex;flex-direction:column;gap:6px}
.dj-label{font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding-bottom:5px;border-bottom:1px solid var(--br)}
.dj-input{background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;line-height:1.8;resize:none;width:100%;caret-color:var(--gold);min-height:56px}
.dj-input::placeholder{color:var(--dim)}

/* Targets */
.target-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--br)}
.target-num{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;color:var(--gold);width:16px;flex-shrink:0;padding-top:2px}
.target-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;caret-color:var(--gold)}
.target-inp::placeholder{color:var(--dim)}
.target-done{width:18px;height:18px;border-radius:50%;border:2px solid var(--br2);flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px;accent-color:var(--gold)}

/* Box tasks */
.dbox-section{display:flex;flex-direction:column;gap:4px}
.dbox-head{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.dbox-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dbox-label{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);flex:1;transition:color .15s}
.dbox-head:hover .dbox-label{color:var(--text)}
.dbox-arr{font-size:.55rem;color:var(--dim);transition:transform .2s}
.dbox-arr.open{transform:rotate(90deg)}
.dbox-tasks{display:flex;flex-direction:column;gap:3px;padding-left:14px;margin-top:3px}
.dbox-task{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;transition:background .12s}
.dbox-task:hover{background:var(--s2)}
.dbox-task input[type=checkbox]{accent-color:var(--gold);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.dbox-task label{font-size:.8rem;color:var(--mid);cursor:pointer;flex:1;line-height:1.4}
.dbox-task label.done{text-decoration:line-through;color:var(--dim)}
.dbox-add{display:flex;gap:5px;padding-left:14px;margin-top:3px}
.dbox-add input{flex:1;background:var(--s1);border:1px solid var(--br);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.76rem;padding:4px 8px;outline:none;transition:border-color .2s}
.dbox-add input:focus{border-color:var(--gold)}
.dbox-add input::placeholder{color:var(--dim)}
.dbox-add button{background:none;border:1px solid var(--br);border-radius:5px;color:var(--dim);font-size:.7rem;padding:3px 7px;cursor:pointer;transition:all .12s}
.dbox-add button:hover{border-color:var(--gold-d);color:var(--gold)}

/* Overflow strip */
.dov-strip{background:var(--s1);border-top:1px solid var(--br);padding:8px 14px;flex-shrink:0}
.dov-strip-label{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.dov-items{display:flex;flex-wrap:wrap;gap:5px}

var mmExpanded = {};      // mind map node expanded state

// ── SYNC STATE ──
var _syncReady = false;

async function initStateAsync() {
  try {
    // 1. Try Firebase first (true cross-device sync)
    var cloudRaw = null;
    try {
      if (window._fbLoad) {
        var fbData = await window._fbLoad();
        if (fbData) cloudRaw = JSON.stringify(fbData);
      }
    } catch(e) {}

    // 2. Fall back to localStorage
    var localRaw = null;
    try { localRaw = localStorage.getItem('sub_v5'); } catch(e) {}

    // 3. Pick whichever is newer by timestamp
    var cloudData = null, localData = null;
    try { if (cloudRaw) cloudData = JSON.parse(cloudRaw); } catch(e) {}
    try { if (localRaw) localData = JSON.parse(localRaw); } catch(e) {}

    var saved = null;
    if (cloudData && localData) {
      saved = ((cloudData._ts||0) >= (localData._ts||0)) ? cloudData : localData;
    } else {
      saved = cloudData || localData;
    }

    if (saved) {
      S = saved;
    } else {
      S = dc(SEED);
      await saveAsync();
    }
  } catch(e) {
    try {
      var fallback = localStorage.getItem('sub_v5');
      S = fallback ? JSON.parse(fallback) : dc(SEED);
    } catch(e2) { S = dc(SEED); }
  }
  _syncReady = true;
  hydrateState();
}

function initState() {
  // Sync wrapper — loads async then renders
  initStateAsync().then(function() {
    renderApp();
    showSyncStatus();
  });
  // Render immediately with localStorage while cloud loads
  try {
    var saved = localStorage.getItem('sub_v5');
    if (saved) {
      S = JSON.parse(saved);
    } else {
      S = dc(SEED);
    }
  } catch(e) { S = dc(SEED); }
  hydrateState();
}

function hydrateState() {
  try {
    BOXES.forEach(function(k) {
      if (!S.boxes[k]) S.boxes[k] = dc(SEED.boxes[k]);
      if (!S.boxes[k].tasks) S.boxes[k].tasks = [];
      if (!S.boxes[k].chapters) S.boxes[k].chapters = dc(SEED.boxes[k].chapters || []);
      if (!S.boxes[k].notes) S.boxes[k].notes = '';
      if (!S.boxes[k].projects) S.boxes[k].projects = '';
    });
    if (!S.boxes.army.tracker) S.boxes.army.tracker = dc(SEED.boxes.army.tracker);
    if (!S.lists) S.lists = dc(SEED.lists);
    if (!S.lists.quotes) S.lists.quotes = dc(SEED.lists.quotes);
    if (!S.lists.media)  S.lists.media  = dc(SEED.lists.media);
    if (!S.dump) S.dump = '';
    if (!S.fitness) S.fitness = dc(SEED.fitness);
    if (!S.fitness.pages) S.fitness.pages = dc(SEED.fitness.pages);
    if (!S.fitness.currentPage) S.fitness.currentPage = 'fit-program';
    if (!S.fitness.currentDay) S.fitness.currentDay = 'monday';
    if (typeof S.fitness.currentBlock !== 'number') S.fitness.currentBlock = 0;
    if (!S.fitness.checked) S.fitness.checked = {};
    if (!S.fitness.dayNotes) S.fitness.dayNotes = {};
    if (!S.homeTabOrder) S.homeTabOrder = ['overview','dump','monthly','weekly','daily','fitness'];
    if (S.homeTabOrder.indexOf('fitness')===-1) S.homeTabOrder.push('fitness');
    curFitnessPage = S.fitness.currentPage;
    if (!S.calEvents) S.calEvents = [];
    if (!S.timeBlocks) S.timeBlocks = [];
    if (!S.dailyData) S.dailyData = {};
    if (!S.dboxOpen) S.dboxOpen = {};
    if (!S.unsortedTasks) S.unsortedTasks = [];
    if (!S.weeklyData) S.weeklyData = {};
    if (!S.ui) S.ui = {};
    if (typeof S.ui.sbWidth !== 'number') S.ui.sbWidth = 196;
    if (typeof S.ui.rsbWidth !== 'number') S.ui.rsbWidth = 180;
    if (typeof S.ui.sbCollapsed !== 'boolean') S.ui.sbCollapsed = false;
    if (typeof S.ui.rsbCollapsed !== 'boolean') S.ui.rsbCollapsed = false;
    if (typeof S.ui.currLeftWidth !== 'number') S.ui.currLeftWidth = 230;
    if (typeof S.ui.currDetailWidth !== 'number') S.ui.currDetailWidth = 400;
    if (typeof S.ui.currLeftCollapsed !== 'boolean') S.ui.currLeftCollapsed = false;
    if (typeof S.ui.currDetailCollapsed !== 'boolean') S.ui.currDetailCollapsed = false;
    if (!S.curriculum) S.curriculum = dc(CURRICULUM);
    if (typeof S.currEditMode !== 'boolean') S.currEditMode = false;
    // Restore custom boxes into BOX_META
    if (S.customBoxes) {
      S.customBoxes.forEach(function(cb) {
        if (!BOX_META.find(function(x){return x.id===cb.id;})) {
          BOX_META.push(cb);
        }
        if (!S.boxes[cb.id]) S.boxes[cb.id] = {tasks:[],projects:'',notes:'',chapters:[]};
      });
    }
    doChoreReset();
  } catch(e) {}
}

function dc(o) { return JSON.parse(JSON.stringify(o)); }

function saveAsync() {
  save();
  return Promise.resolve();
}

function renderApp() {
  buildSB();
  buildTabBar();
  buildRSB();
  renderCanvas();
  applySidebarLayout();
}

function resetAppData() {
  if (!confirm('Reset Subroutine to fresh data? This clears all saved state.')) return;
  try { localStorage.removeItem('sub_v5'); } catch(e) {}
  location.reload();
}

function save() {
  try {
    S._ts = Date.now();
    var json = JSON.stringify(S);
    // Save to localStorage immediately (fast, offline fallback)
    try { localStorage.setItem('sub_v5', json); } catch(e) {}
    // Save to Firebase async (true cross-device sync)
    if (window._fbSave) {
      window._fbSave(json).catch(function(){});
    }
  } catch(e) {}
}

function stampForFileName() {
  var d = new Date();
  function pad(n){ return String(n).padStart(2,'0'); }
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + '_' + pad(d.getHours()) + '-' + pad(d.getMinutes());
}

function flashStatus(msg, color) {
  var el2 = document.getElementById('sync-status');
  if (!el2) return;
  el2.textContent = msg;
  el2.style.color = color || 'var(--mid)';
  clearTimeout(flashStatus._t);
  flashStatus._t = setTimeout(function(){
    showSyncStatus();
  }, 2600);
}

function exportData() {
  try {
    S._ts = Date.now();
    var payload = JSON.stringify(S, null, 2);
    var blob = new Blob([payload], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'subroutine-save-' + stampForFileName() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    flashStatus('⇩ Exported JSON', 'var(--gold)');
  } catch(e) {
    alert('Export failed. Your browser blocked the save file or ran into an error.');
  }
}

function triggerImport() {
  var inp = document.getElementById('import-file');
  if (!inp) return;
  inp.value = '';
  inp.click();
}

function handleImportFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(evt) {
    try {
      var incoming = JSON.parse(evt.target.result);
      if (!incoming || typeof incoming !== 'object' || !incoming.boxes || !incoming.lists) {
        throw new Error('Invalid Subroutine file');
      }
      if (!confirm('Import this save file? This will replace the current local data on this device.')) return;
      S = incoming;
      hydrateState();
      save();
      renderApp();
      flashStatus('⇧ Imported JSON', 'var(--ok)');
    } catch(err) {
      alert('That file could not be imported. Make sure it is a valid Subroutine JSON save.');
    }
  };
  reader.onerror = function() {
    alert('Import failed because the file could not be read.');
  };
  reader.readAsText(file);
}

function showSyncStatus() {
  var el2 = document.getElementById('sync-status');
  if (!el2) return;
  el2.textContent = _syncReady ? '\u2601 Synced' : '\u231b Syncing...';
  el2.style.color = _syncReady ? 'var(--ok)' : 'var(--dim)';
  if (_syncReady) setTimeout(function(){ el2.textContent = ''; }, 2500);
}
function el(tag, cls) { var e = document.createElement(tag); if (cls) e.className = cls; return e; }
function tx(s) { return document.createTextNode(s); }
function bx(id) { return S.boxes[id]; }
function bm(id) { for (var i=0;i<BOX_META.length;i++) { if (BOX_META[i].id===id) return BOX_META[i]; } return {id:id,label:id,icon:'',color:'var(--gold)'}; }

function doChoreReset() {
  var d = new Date(); var sun = new Date(d);
  sun.setDate(d.getDate() - d.getDay());
  var key = sun.toISOString().slice(0,10);
  if (d.getDay()===0 && S.lists.lastReset!==key) {
    S.lists.chores.forEach(function(c){c.d=false;});
    S.lists.lastReset = key; save();
  }
}

function parseProjects(txt) {
  var out = [];
  (txt||'').split('\n').forEach(function(line) {
    line = line.trim(); if (!line) return;
    var m = line.match(/^(.+?)\s*\[(\w+)\]\s*$/);
    if (m) out.push({name:m[1].trim(),status:m[2].toLowerCase()});
    else out.push({name:line,status:'unknown'});
  });
  return out;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────
function buildSB() {
  var inner = document.getElementById('sb-inner');
  inner.innerHTML = '';

  // HOME
  inner.appendChild(makeRow('home','⬡ Home','var(--gold)'));

  // LISTS (above boxes)
  var ls = el('div','sb-sec'); ls.appendChild(tx('Lists')); inner.appendChild(ls);
  inner.appendChild(makeRow('lists-chores','📋 Chores','var(--lists)'));
  inner.appendChild(makeRow('lists-grocery','🛒 Grocery','var(--lists)'));
  inner.appendChild(makeRow('lists-wishlist','⭐ Wish List','var(--lists)'));
  inner.appendChild(makeRow('lists-quotes','💬 Quotes','var(--lists)'));
  inner.appendChild(makeRow('lists-media','🎮 Movies & Games','var(--lists)'));

  // BOXES
  var bs = el('div','sb-sec'); bs.appendChild(tx('Boxes')); inner.appendChild(bs);
  BOX_META.forEach(function(b) {
    inner.appendChild(makeRow(b.id, b.icon+' '+b.label, b.color));
  });
}

function makeRow(id, label, color) {
  var isOn = (curTab===id) || (id==='home' && curTab==='home') ||
             (id==='lists-chores' && curTab==='lists' && curSec==='chores') ||
             (id==='lists-grocery' && curTab==='lists' && curSec==='grocery') ||
             (id==='lists-wishlist' && curTab==='lists' && curSec==='wishlist') ||
             (id==='lists-quotes' && curTab==='lists' && curSec==='quotes') ||
             (id==='lists-media' && curTab==='lists' && curSec==='media');
  var row = el('div','sb-row'+(isOn?' on':''));
  row.style.setProperty('--rc', color);
  var dot = el('div','sb-dot');
  var lbl = el('div','sb-lbl'); lbl.appendChild(tx(label));
  row.appendChild(dot); row.appendChild(lbl);
  row.onclick = function() {
    if (id==='home') { curTab='home'; curSec='daily'; curChapter=null; curPage=null; }
    else if (id==='lists-chores') { curTab='lists'; curSec='chores'; curChapter=null; curPage=null; }
    else if (id==='lists-grocery') { curTab='lists'; curSec='grocery'; curChapter=null; curPage=null; }
    else if (id==='lists-wishlist') { curTab='lists'; curSec='wishlist'; curChapter=null; curPage=null; }
    else if (id==='lists-quotes')   { curTab='lists'; curSec='quotes';   curChapter=null; curPage=null; }
    else if (id==='lists-media')    { curTab='lists'; curSec='media';    curChapter=null; curPage=null; }
    else { curTab=id; curSec='tasks'; curChapter=null; curPage=null; }
    buildSB(); buildTabBar(); buildRSB(); renderCanvas();
    if (window.innerWidth<=680) closeSB();
  };
  return row;
}

// ─── TAB BAR (chapters/projects) ─────────────────────────────────
function buildTabBar() {
  var bar = document.getElementById('tab-bar');
  bar.innerHTML = '';

  if (curTab==='home') {
    bar.style.display='flex';
    var homeLabels = {overview:'Overview', dump:'Brain Dump', monthly:'Monthly', weekly:'Weekly', daily:'Daily', fitness:'Fitness'};
    var defaultOrder = ['overview','dump','monthly','weekly','daily','fitness'];
    if (!S.homeTabOrder) S.homeTabOrder = defaultOrder.slice();
    // Ensure all tabs present
    defaultOrder.forEach(function(s){ if(S.homeTabOrder.indexOf(s)===-1) S.homeTabOrder.push(s); });

    S.homeTabOrder.forEach(function(s, i) {
      var btn = el('button','tab-pill'+(curSec===s?' on':''));
      btn.style.setProperty('--rc','var(--gold)');
      btn.draggable = true;
      btn.dataset.htIdx = String(i);
      var dot = el('div','tab-dot'); dot.style.background='var(--gold)';
      btn.appendChild(dot); btn.appendChild(tx(homeLabels[s]||s));
      (function(sec, idx) {
        btn.onclick = function() { curSec=sec; buildTabBar(); buildRSB(); renderCanvas(); };
        btn.ondragstart = function(e) { e.dataTransfer.setData('htidx', String(idx)); setTimeout(function(){btn.classList.add('dragging-tab');},0); };
        btn.ondragend   = function() { btn.classList.remove('dragging-tab'); document.querySelectorAll('.tab-pill').forEach(function(t){t.classList.remove('drag-over');}); };
        btn.ondragover  = function(e) { e.preventDefault(); btn.classList.add('drag-over'); };
        btn.ondragleave = function() { btn.classList.remove('drag-over'); };
        btn.ondrop      = function(e) {
          e.preventDefault(); btn.classList.remove('drag-over');
          var from = parseInt(e.dataTransfer.getData('htidx'),10);
          var to = idx;
          if(isNaN(from)||from===to) return;
          var moved = S.homeTabOrder.splice(from,1)[0];
          S.homeTabOrder.splice(to,0,moved);
          save(); buildTabBar();
        };
      })(s, i);
      bar.appendChild(btn);
    });
    return;
  }

  if (curTab==='lists') { bar.style.display='none'; return; }

  var box = bx(curTab);
  var meta = bm(curTab);
  bar.style.display='flex';
  bar.style.setProperty('--rc', meta.color);

  // Fixed sections
  ['tasks','projects','notes'].forEach(function(s) {
    var labels = {tasks:'Tasks', projects:'Projects', notes:'Notes'};
    var btn = el('button','tab-pill'+(curSec===s?' on':''));
    btn.style.setProperty('--rc', meta.color);
    var dot = el('div','tab-dot'); dot.style.background=meta.color;
    btn.appendChild(dot); btn.appendChild(tx(labels[s]));
    btn.onclick = function() { curSec=s; curChapter=null; curPage=null; buildTabBar(); buildRSB(); renderCanvas(); };
    bar.appendChild(btn);
  });

  if (curTab==='army') {
    var trk = el('button','tab-pill'+(curSec==='tracker'?' on':''));
    trk.style.setProperty('--rc', meta.color);
    var d2 = el('div','tab-dot'); d2.style.background=meta.color;
    trk.appendChild(d2); trk.appendChild(tx('OCS Tracker'));
    trk.onclick = function() { curSec='tracker'; curChapter=null; curPage=null; buildTabBar(); buildRSB(); renderCanvas(); };
    bar.appendChild(trk);
  }

  if (curTab==='teaching') {
    var cur = el('button','tab-pill'+(curSec==='curriculum'?' on':''));
    cur.style.setProperty('--rc', meta.color);
    var d3 = el('div','tab-dot'); d3.style.background=meta.color;
    cur.appendChild(d3); cur.appendChild(tx('Curriculum'));
    cur.onclick = function() { curSec='curriculum'; curChapter=null; curPage=null; buildTabBar(); buildRSB(); renderCanvas(); };
    bar.appendChild(cur);
  }

  // Chapters (projects as tabs)
  var sep = el('div',''); sep.style.cssText='width:1px;background:var(--br);margin:8px 4px;flex-shrink:0';
  bar.appendChild(sep);

  (box.chapters||[]).forEach(function(ch, i) {
    var btn = el('button','tab-pill'+(curChapter===ch.id?' on':''));
    btn.style.setProperty('--rc', meta.color);
    btn.draggable = true;
    btn.dataset.chIdx = String(i);
    var dot = el('div','tab-dot'); dot.style.background=meta.color;
    btn.appendChild(dot); btn.appendChild(tx(ch.label));
    (function(chId, chapter, idx) {
      btn.onclick = function() {
        curSec='chapter'; curChapter=chId;
        curPage=(chapter.pages&&chapter.pages.length)?chapter.pages[0].id:null;
        buildTabBar(); buildRSB(); renderCanvas();
      };
      btn.ondblclick = function(e) {
        e.stopPropagation();
        var textNode = btn.querySelector('span') || btn.lastChild;
        var inp3 = document.createElement('input');
        inp3.value = chapter.label;
        inp3.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--gold);color:var(--text);font-family:Rajdhani,sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1px;outline:none;width:'+(chapter.label.length*9+10)+'px;min-width:40px;max-width:160px';
        btn.replaceChild(inp3, textNode);
        inp3.focus(); inp3.select();
        function commit() {
          var val = inp3.value.trim() || chapter.label;
          chapter.label = val;
          save(); buildTabBar();
        }
        inp3.onblur = commit;
        inp3.onkeydown = function(e2) {
          if (e2.key === 'Enter') { inp3.blur(); }
          if (e2.key === 'Escape') { inp3.value = chapter.label; inp3.blur(); }
          e2.stopPropagation();
        };
      };
      btn.ondragstart = function(e) {
        e.dataTransfer.setData('chidx', String(idx));
        setTimeout(function(){btn.classList.add('dragging-tab');},0);
      };
      btn.ondragend = function() {
        btn.classList.remove('dragging-tab');
        document.querySelectorAll('.tab-pill').forEach(function(t){t.classList.remove('drag-over');});
      };
      btn.ondragover = function(e) { e.preventDefault(); btn.classList.add('drag-over'); };
      btn.ondragleave = function() { btn.classList.remove('drag-over'); };
      btn.ondrop = function(e) {
        e.preventDefault();
        btn.classList.remove('drag-over');
        var fromIdx = parseInt(e.dataTransfer.getData('chidx'), 10);
        var toIdx = idx;
        if (isNaN(fromIdx) || fromIdx === toIdx) return;
        var moved = box.chapters.splice(fromIdx, 1)[0];
        box.chapters.splice(toIdx, 0, moved);
        save(); buildTabBar();
      };
    })(ch.id, ch, i);
    bar.appendChild(btn);
  });

  // Add chapter button
  var addBtn = el('button','tab-add');
  addBtn.appendChild(tx('+'));
  addBtn.title = 'Add chapter/project';
  addBtn.onclick = function() {
    var name = prompt('Chapter name (e.g. a project)?');
    if (!name) return;
    var ch = { id:'ch'+Date.now(), label:name, pages:[
      {id:'pg'+Date.now(), icon:'📝', label:'Notes', content:''}
    ]};
    box.chapters.push(ch);
    curSec='chapter'; curChapter=ch.id; curPage=ch.pages[0].id;
    save(); buildTabBar(); buildRSB(); renderCanvas();
  };
  bar.appendChild(addBtn);
}

// ─── RIGHT SIDEBAR (pages within a chapter) ──────────────────────
function buildRSB() {
  var rsb = document.getElementById('rsb');
  var scroll = document.getElementById('rsb-scroll');
  scroll.innerHTML = '';

  // Fitness home tab uses right sidebar as page list too
  if (curTab==='home' && curSec==='fitness') {
    var fit = S.fitness || dc(SEED.fitness);
    rsb.classList.remove('hidden');
    applySidebarLayout();
    rsb.style.setProperty('--rc', 'var(--gold)');
    document.getElementById('rsb-head-label').textContent = 'Fitness Pages';
    document.getElementById('rsb-add-btn').textContent = '+ Add Page';
    (fit.pages||[]).forEach(function(page, i) {
      var row = el('div','rp-row'+(fit.currentPage===page.id?' on':''));
      row.style.setProperty('--rc', 'var(--gold)');
      row.draggable = true;
      row.dataset.rpIdx = String(i);
      var ico = el('div','rp-icon'); ico.appendChild(tx(page.icon||'📄'));
      var lbl2 = el('div','rp-lbl'); lbl2.appendChild(tx(page.label));
      var del = el('button','rp-del'); del.appendChild(tx(page.id==='fit-program' ? '•' : '✕'));
      del.title = page.id==='fit-program' ? 'Program page is pinned' : 'Delete page';
      (function(pid, p, idx) {
        del.onclick = function(e) {
          e.stopPropagation();
          if (p.id==='fit-program') return;
          if (!confirm('Delete "'+p.label+'"?')) return;
          fit.pages = fit.pages.filter(function(x){return x.id!==pid;});
          if (fit.currentPage===pid) fit.currentPage = fit.pages.length ? fit.pages[0].id : 'fit-program';
          curFitnessPage = fit.currentPage;
          save(); buildRSB(); renderCanvas();
        };
        row.onclick = function() { fit.currentPage=pid; curFitnessPage=pid; save(); buildRSB(); renderCanvas(); };
        row.ondragstart = function(e) { e.dataTransfer.setData('fitrpidx', String(idx)); setTimeout(function(){row.style.opacity='.35';},0); };
        row.ondragend   = function() { row.style.opacity=''; document.querySelectorAll('.rp-row').forEach(function(r){r.classList.remove('drag-over');}); };
        row.ondragover  = function(e) { e.preventDefault(); row.classList.add('drag-over'); };
        row.ondragleave = function() { row.classList.remove('drag-over'); };
        row.ondrop      = function(e) {
          e.preventDefault(); row.classList.remove('drag-over'); row.style.opacity='';
          var from = parseInt(e.dataTransfer.getData('fitrpidx'),10);
          var to = idx;
          if(isNaN(from)||from===to) return;
          var moved = fit.pages.splice(from,1)[0];
          fit.pages.splice(to,0,moved);
          save(); buildRSB();
        };
      })(page.id, page, i);
      row.appendChild(ico); row.appendChild(lbl2); row.appendChild(del);
      scroll.appendChild(row);
    });
    return;
  }

  // Only show RSB when in a chapter
  if (curSec !== 'chapter' || !curChapter || !S.boxes[curTab]) {
    rsb.classList.add('hidden'); applySidebarLayout(); return;
  }

  var box = bx(curTab);
  var ch = null;
  (box.chapters||[]).forEach(function(c) { if (c.id===curChapter) ch=c; });
  if (!ch) { rsb.classList.add('hidden'); applySidebarLayout(); return; }

  rsb.classList.remove('hidden');
  applySidebarLayout();
  var meta = bm(curTab);
  rsb.style.setProperty('--rc', meta.color);

  var lbl = document.getElementById('rsb-head-label');
  lbl.textContent = ch.label;
  document.getElementById('rsb-add-btn').textContent = '+ Add Page';

  (ch.pages||[]).forEach(function(page, i) {
    var row = el('div','rp-row'+(curPage===page.id?' on':''));
    row.style.setProperty('--rc', meta.color);
    row.draggable = true;
    row.dataset.rpIdx = String(i);
    var ico = el('div','rp-icon'); ico.appendChild(tx(page.icon||'📄'));
    var lbl2 = el('div','rp-lbl'); lbl2.appendChild(tx(page.label));
    var del = el('button','rp-del'); del.appendChild(tx('✕'));
    del.title='Delete page';
    (function(pid, p, idx) {
      del.onclick = function(e) {
        e.stopPropagation();
        if (!confirm('Delete "'+p.label+'"?')) return;
        ch.pages = ch.pages.filter(function(x){return x.id!==pid;});
        if (curPage===pid) curPage = ch.pages.length ? ch.pages[0].id : null;
        save(); buildRSB(); renderCanvas();
      };

function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

function applySidebarLayout() {
  var sb = document.getElementById('sb');
  var rsb = document.getElementById('rsb');
  var sbc = document.getElementById('sb-collapse');
  var rsbc = document.getElementById('rsb-collapse');
  if (!sb || !rsb) return;
  if (!S.ui) return;

  var mobile = window.innerWidth <= 900;
  if (mobile) {
    sb.classList.remove('collapsed');
    rsb.classList.remove('collapsed');
    sb.style.width='';
    rsb.style.width='';
    if (sbc) sbc.textContent='◀';
    if (rsbc) rsbc.textContent='▶';
    return;
  }

  sb.style.width = clamp(S.ui.sbWidth||196, 150, 420) + 'px';
  rsb.style.width = clamp(S.ui.rsbWidth||180, 140, 380) + 'px';

  sb.classList.toggle('collapsed', !!S.ui.sbCollapsed);
  var showRight = ((curSec === 'chapter' && !!curChapter && !!S.boxes[curTab]) || (curTab==='home' && curSec==='fitness')) && !rsb.classList.contains('hidden');
  rsb.classList.toggle('collapsed', !!S.ui.rsbCollapsed && showRight);

  if (sbc) {
    sbc.textContent = S.ui.sbCollapsed ? '▶' : '◀';
    sbc.title = S.ui.sbCollapsed ? 'Expand left sidebar' : 'Collapse left sidebar';
    sbc.style.display = 'flex';
    sbc.style.right = S.ui.sbCollapsed ? '-28px' : '8px';
  }
  if (rsbc) {
    rsbc.textContent = (S.ui.rsbCollapsed && showRight) ? '◀' : '▶';
    rsbc.title = (S.ui.rsbCollapsed && showRight) ? 'Expand right sidebar' : 'Collapse right sidebar';
    rsbc.style.display = showRight ? 'flex' : 'none';
    rsbc.style.left = (S.ui.rsbCollapsed && showRight) ? '-28px' : '8px';
  }
}

function initSidebarControls() {
  var layout = document.getElementById('layout');
  var sb = document.getElementById('sb');
  var rsb = document.getElementById('rsb');
  var sbHandle = document.getElementById('sb-resize');
  var rsbHandle = document.getElementById('rsb-resize');
  var sbCollapse = document.getElementById('sb-collapse');
  var rsbCollapse = document.getElementById('rsb-collapse');
  if (!layout || !sb || !rsb || !sbHandle || !rsbHandle || !sbCollapse || !rsbCollapse) return;
  if (!S.ui) S.ui = {sbWidth:196, rsbWidth:180, sbCollapsed:false, rsbCollapsed:false};

  sbCollapse.onclick = function() {
    if (window.innerWidth <= 900) return;
    S.ui.sbCollapsed = !S.ui.sbCollapsed;
    save();
    applySidebarLayout();
  };
  rsbCollapse.onclick = function() {
    if (window.innerWidth <= 900) return;
    S.ui.rsbCollapsed = !S.ui.rsbCollapsed;
    save();
    applySidebarLayout();
  };

  function startResize(which, e) {
    if (window.innerWidth <= 900) return;
    e.preventDefault();
    layout.classList.add('dragging-sidebars');
    var handle = which==='left' ? sbHandle : rsbHandle;
    handle.classList.add('dragging');
    function move(ev) {
      if (which==='left') {
        S.ui.sbCollapsed = false;
        S.ui.sbWidth = clamp(ev.clientX - layout.getBoundingClientRect().left, 150, 420);
      } else {
        S.ui.rsbCollapsed = false;
        S.ui.rsbWidth = clamp(layout.getBoundingClientRect().right - ev.clientX, 140, 380);
      }
      applySidebarLayout();
    }
    function up() {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      layout.classList.remove('dragging-sidebars');
      handle.classList.remove('dragging');
      save();
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  }
  sbHandle.onmousedown = function(e){ startResize('left', e); };
  rsbHandle.onmousedown = function(e){ startResize('right', e); };

  window.addEventListener('resize', applySidebarLayout);
  applySidebarLayout();
}

function makeDraggable(node, boxId, line, cx, cy) {
  var startX, startY, startLeft, startTop, dragging = false;

  function onDown(e) {
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startX = clientX; startY = clientY;
    startLeft = parseFloat(node.style.left);
    startTop  = parseFloat(node.style.top);
    dragging = true;
    node._wasDragged = false;
    node.classList.add('dragging');
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var dx = clientX - startX;
    var dy = clientY - startY;
    if (Math.abs(dx)>3 || Math.abs(dy)>3) node._wasDragged = true;
    var newX = startLeft + dx;
    var newY = startTop  + dy;
    node.style.left = newX + 'px';
    node.style.top  = newY + 'px';
    // Update line
    if (line) {
      line.setAttribute('x2', newX);
      line.setAttribute('y2', newY);
    }
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    node.classList.remove('dragging');
    // Persist position
    if (!S.mmPositions) S.mmPositions = {};
    S.mmPositions[boxId] = { x: parseFloat(node.style.left), y: parseFloat(node.style.top) };
    save();
  }

  node.addEventListener('mousedown',  onDown);
  node.addEventListener('touchstart',  onDown, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove',  onMove, {passive:false});
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchend',  onUp);
}

function addNewBox() {

  var color = colors[Math.floor(Math.random()*colors.length)];

  // Add to BOX_META
  BOX_META.push({ id:id, label:name, icon:icon, color:color });

  // Add to custom boxes list for persistence
  if (!S.customBoxes) S.customBoxes = [];
  S.customBoxes.push({ id:id, label:name, icon:icon, color:color });

  // Create the box data
  S.boxes[id] = { tasks:[], projects:'', notes:'', chapters:[] };

  // Place near center of visible map with offset
  var wrap = document.getElementById('mm-wrap');

  S.mmPositions[id] = { x: W/2 + r*Math.cos(angle), y: H/2 + r*Math.sin(angle) };

  save();
  buildSB();
  renderCanvas(); // re-render map with new node
}

function renderMonthly(cv) {

  var todayBtn = el('button','cal-nav-btn cal-today-btn'); todayBtn.textContent='Today';
  todayBtn.onclick = function(){ calMonth=new Date().getMonth(); calYear=new Date().getFullYear(); renderCanvas(); };

  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  var today2 = todayStr();

  // Build cell date index
  var totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;
  var cellDates = [];
  for (var i=0; i<totalCells; i++) {
    var dayNum2, ds2, isOther2=false;
    if (i < firstDay) {
      dayNum2 = daysInPrev - firstDay + i + 1;
      var pm2 = calMonth===0?11:calMonth-1, py2 = calMonth===0?calYear-1:calYear;
      ds2 = dateStr(py2, pm2, dayNum2); isOther2=true;
    } else if (i >= firstDay+daysInMonth) {
      dayNum2 = i - firstDay - daysInMonth + 1;
      var nm2 = calMonth===11?0:calMonth+1, ny2 = calMonth===11?calYear+1:calYear;
      ds2 = dateStr(ny2, nm2, dayNum2); isOther2=true;
    } else {
      dayNum2 = i - firstDay + 1;
      ds2 = dateStr(calYear, calMonth, dayNum2);
    }
    cellDates.push({ds:ds2, dayNum:dayNum2, isOther:isOther2, col:i%7, row:Math.floor(i/7)});
  }

  var numRows = totalCells/7;
  var cells = [];

  // Create cells
  for (var ci=0; ci<totalCells; ci++) {
    var cd = cellDates[ci];
    var cell = el('div','cal-day');
    if (cd.isOther) cell.classList.add('other-month');
    if (cd.ds===today2) cell.classList.add('today');
    var numEl = el('div','cal-day-num'); numEl.textContent=cd.dayNum; cell.appendChild(numEl);
    // event lanes container — positioned absolutely
    var lanesEl = el('div','cal-lanes'); cell.appendChild(lanesEl);
    var addBtn2 = el('div','cal-add-hint'); addBtn2.textContent='+ add'; cell.appendChild(addBtn2);
    cell.dataset.ds = cd.ds;
    (function(dateS, c2, ne){
      addBtn2.onclick = function(e){ e.stopPropagation(); openCalModal(dateS); };
      c2.onclick = function(e){ if(e.target===c2||e.target===ne||e.target===addBtn2) openCalModal(dateS); };
      c2.ondragover = function(e){ e.preventDefault(); c2.style.background='var(--s3)'; };
      c2.ondragleave = function(){ c2.style.background=''; };
      c2.ondrop = function(e){
        e.preventDefault(); c2.style.background='';
        if (!calDragEvent) return;
        var ev2 = S.calEvents.find(function(x){return x.id===calDragEvent;});
        if (!ev2) return;
        var origStart = parseDate(ev2.date);
        var origEnd = ev2.endDate ? parseDate(ev2.endDate) : origStart;
        var span = Math.round((origEnd-origStart)/(1000*60*60*24));
        var newStart = parseDate(dateS);
        var newEnd = new Date(newStart); newEnd.setDate(newEnd.getDate()+span);
        ev2.date = dateStr(newStart.getFullYear(), newStart.getMonth(), newStart.getDate());
        ev2.endDate = span>0 ? dateStr(newEnd.getFullYear(), newEnd.getMonth(), newEnd.getDate()) : ev2.date;
        calDragEvent = null; save(); renderCanvas();
      };
    })(cd.ds, cell, numEl);
    cells.push(cell);
    grid.appendChild(cell);
  }

  // Layout multi-day events using lane algorithm (per row)
  var colors = ['#5cb87a','#e8a030','#38bcd4','#c87de0','#e07840','#4da6ff','#e05a5a','#a09ab8'];

  for (var row=0; row<numRows; row++) {
    var rowStart = row*7;
    var rowEnd   = rowStart+6;
    var rowDates = cellDates.slice(rowStart, rowStart+7).map(function(c){return c.ds;});

    // Find events that appear in this row
    var rowEvents = (S.calEvents||[]).filter(function(ev){
      var es = ev.date, ee = ev.endDate||ev.date;
      return es <= rowDates[6] && ee >= rowDates[0];
    });

    // Sort: longer events first so they get lower lanes
    rowEvents.sort(function(a,b){
      var as2=a.date,ae2=a.endDate||a.date,bs2=b.date,be2=b.endDate||b.date;
      var al=Math.round((parseDate(ae2)-parseDate(as2))/(1000*60*60*24));
      var bl=Math.round((parseDate(be2)-parseDate(bs2))/(1000*60*60*24));
      return bl-al;
    });

    // Assign lanes
    var lanes = []; // lanes[i] = end col of last event in that lane
    rowEvents.forEach(function(ev) {
      var es2 = ev.date < rowDates[0] ? rowDates[0] : ev.date;
      var ee2 = (ev.endDate||ev.date) > rowDates[6] ? rowDates[6] : (ev.endDate||ev.date);
      var startCol = rowDates.indexOf(es2);
      var endCol   = rowDates.indexOf(ee2);
      if (startCol<0||endCol<0) return;

      // Find free lane
      var lane = 0;
      while (lanes[lane] !== undefined && lanes[lane] >= startCol) lane++;
      lanes[lane] = endCol;

      var evColor = colors[ev.colorIdx%colors.length];
      var isStart = ev.date >= rowDates[0];
      var isEnd   = (ev.endDate||ev.date) <= rowDates[6];

      // Render the event bar spanning startCol to endCol in this row
      for (var col=startCol; col<=endCol; col++) {
        var cellIdx = rowStart+col;
        var lanesEl2 = cells[cellIdx].querySelector('.cal-lanes');
        var evEl = el('div','cal-event ev-color');
        evEl.style.background = evColor;
        evEl.style.top = (lane*20+2)+'px';
        if (col===startCol && isStart) {
          evEl.style.borderRadius = '4px 0 0 4px';
          evEl.style.marginLeft = '2px';
          var span2 = el('span',''); span2.textContent=ev.title; span2.style.cssText='font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block';
          evEl.appendChild(span2);
        } else if (col===startCol) {
          evEl.style.borderRadius = '0';
          evEl.style.marginLeft = '0';
        } else {
          evEl.style.borderRadius = '0';
          evEl.style.marginLeft = '-1px';
        }
        if (col===endCol && isEnd) {
          evEl.style.borderRadius = (col===startCol&&isStart)?'4px':'0 4px 4px 0';
          evEl.style.marginRight = '2px';
          // Resize handle
          var rz2 = el('div','cal-event-resize');
          evEl.appendChild(rz2);
          (function(evId2){
            rz2.onmousedown = function(e){
              e.stopPropagation(); e.preventDefault();
              calResizeEvent = evId2;
              document.body.style.userSelect='none';
            };
          })(ev.id);
        } else {
          evEl.style.marginRight = '-1px';
        }
        // Double-click to delete
        (function(evId2){
          evEl.ondblclick = function(e){ e.stopPropagation(); openCalEditModal(evId2); };
          evEl.ondragstart = function(e){ calDragEvent=evId2; evEl.classList.add('dragging'); e.dataTransfer.setData('text/plain',evId2); };
          evEl.ondragend   = function(){ calDragEvent=null; evEl.classList.remove('dragging'); };
          evEl.draggable = true;
        })(ev.id);
        lanesEl2.appendChild(evEl);
      }

      // Adjust cell min-height based on lane count
      var neededH = (lane+1)*20+28;
      for (var col2=startCol; col2<=endCol; col2++) {
        var c3 = cells[rowStart+col2];
        var cur = parseInt(c3.style.minHeight)||96;
        if (neededH > cur) c3.style.minHeight = neededH+'px';
      }
    });
  }

  // Resize handled by global document listeners

  wrap.appendChild(grid);
  cv.appendChild(wrap);
}
