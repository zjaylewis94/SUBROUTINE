  });
  leftPanel.appendChild(legend);

  var hint = el('div','');
  hint.style.cssText = 'font-size:10px;color:var(--dim);text-align:center;margin:4px 0 2px';
  hint.textContent = 'Drag any ring to rotate it · Drag white handles on outer ring to resize · Hover for details';
  leftPanel.appendChild(hint);

  cv.appendChild(leftPanel);

  // ── RIGHT: Notes panel ──
  var rightPanel = el('div','');
  rightPanel.style.cssText = 'flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;min-width:0';

  var rnTitle = el('div','dj-label'); rnTitle.textContent = 'Ramhaus Notes & Planning';
  rightPanel.appendChild(rnTitle);

  // Pages from the chapter as editable sections
  (ch.pages||[]).forEach(function(page) {
    var sec = el('div','dj-section');
    var lbl = el('div','dj-label'); lbl.textContent = page.icon + ' ' + page.label;
    var ed = buildEditor(
      'Notes for ' + page.label + '…',
      textToHtml(page.content||''),
      (function(pg){ return function(html){ pg.content=html; save(); }; })(page)
    );
    sec.appendChild(lbl);
    sec.appendChild(ed.wrap);
    rightPanel.appendChild(sec);
  });

  cv.appendChild(rightPanel);

  // ── Init wheel on the canvas ──
  var SIZE = 580;
  wheelCanvas.width = SIZE*2; wheelCanvas.height = SIZE*2;
  var wCtx = wheelCanvas.getContext('2d');
  wCtx.scale(2,2);
  var wcx=SIZE/2, wcy=SIZE/2;
  var GAP=0.015;

  var R_CORE=72,R_EL_I=75,R_EL_O=147,R_MED_I=150,R_MED_O=238,R_OUT_I=241,R_OUT_O=294;
  var rotEl=0,rotMed=0,rotOut=0;

  var outerData=[
    {label:'Observation & Seeing',color:'#1e4976',tip:'<b>Observation & Seeing</b><br>Training the eye before the hand — contour, negative space, gesture, drawing what you actually see rather than what you think you see.'},
    {label:'Proportion & Scale',color:'#193f68',tip:'<b>Proportion & Scale</b><br>Measuring relationships between parts, comparative sizing, and how scale creates meaning and spatial hierarchy.'},
    {label:'Light & Shadow',color:'#12304f',tip:'<b>Light & Shadow</b><br>Value structure, light sources, cast vs form shadow, tonal modeling — the bridge into Color & Value in the next ring.'},
    {label:'Color Theory',color:'#0e2740',tip:'<b>Color Theory</b><br>Color wheel, hue, saturation, temperature, complementary and analogous relationships, color as an expressive tool.'},
    {label:'Art History & Context',color:'#1a3a5c',tip:'<b>Art History & Context</b><br>Key movements, artists, and cultural contexts that shaped drawing and painting.'},
    {label:'Visual Vocabulary',color:'#152f4d',tip:'<b>Visual Vocabulary</b><br>The language of art — terms, concepts, and critical frameworks students need to describe, analyze, and discuss work.'},
  ];
  var outerLens=outerData.map(function(d){return d.label.length+5;});
  var outerTotal=outerLens.reduce(function(a,b){return a+b;},0);
  var dividers=[];
  (function(){var a=-Math.PI/2; for(var i=0;i<6;i++){dividers.push(a);a+=(outerLens[i]/outerTotal)*Math.PI*2;}})();

  var elData=[
    {label:'Line',color:'#1a5930',textColor:'#c8f0d8',tip:'<b>Line</b><br>Contour, gesture, implied, expressive. The primary tool of drawing.'},
    {label:'Shape & Form',color:'#175230',textColor:'#c8f0d8',tip:'<b>Shape & Form</b><br>2D vs 3D, positive/negative space, geometric vs organic.'},
    {label:'Color & Value',color:'#134828',textColor:'#c8f0d8',tip:'<b>Color & Value</b><br>Hue, saturation, and the full tonal range.'},
    {label:'Texture',color:'#1e5c34',textColor:'#c8f0d8',tip:'<b>Texture</b><br>Actual vs implied texture, mark-making, surface quality.'},
    {label:'Space & Perspective',color:'#174d2c',textColor:'#c8f0d8',tip:'<b>Space & Perspective</b><br>1-, 2-, 3-point perspective, foreshortening, atmospheric depth.'},
    {label:'Composition',color:'#1a5930',textColor:'#c8f0d8',tip:'<b>Composition & Unity</b><br>Rule of thirds, balance, focal point, unity, variety.'},
    {label:'Emphasis & Contrast',color:'#1e5c34',textColor:'#c8f0d8',tip:'<b>Emphasis & Contrast</b><br>Visual hierarchy, creating focus, variety vs harmony.'},
    {label:'Movement & Pattern',color:'#134828',textColor:'#c8f0d8',tip:'<b>Movement & Pattern</b><br>Leading the eye through a composition; rhythm, repetition.'},
  ];
  var medData=[
    {label:'Pencil',color:'#6b2a1a',textColor:'#fde0d0',tip:'<b>Pencil</b><br>Value, line quality, hatching, blending. The foundation of drawing.'},
    {label:'Charcoal',color:'#5c2216',textColor:'#fde0d0',tip:'<b>Charcoal</b><br>Expressive mark-making, broad tonal modeling, erasing as drawing.'},
    {label:'Ink',color:'#4d1c13',textColor:'#fde0d0',tip:'<b>Ink</b><br>Line weight, cross-hatching, wash, permanence and commitment.'},
    {label:'Pastels',color:'#7a3020',textColor:'#fde0d0',tip:'<b>Pastels</b><br>Color blending on paper, layering, soft vs hard pastel techniques.'},
    {label:'Color Pencils',color:'#6b2a1a',textColor:'#fde0d0',tip:'<b>Color Pencils</b><br>Layering color, burnishing, controlled detail and texture.'},
    {label:'Markers',color:'#5c2216',textColor:'#fde0d0',tip:'<b>Markers</b><br>Flat color, gradient blending, bold outlines, speed sketching.'},
    {label:'Tempera',color:'#7a3020',textColor:'#fde0d0',tip:'<b>Tempera Paint</b><br>Opaque flat color, mixing, layering from dark to light.'},
    {label:'Watercolor',color:'#6b2a1a',textColor:'#fde0d0',tip:'<b>Watercolor</b><br>Wet-on-wet, wet-on-dry, transparency and layering.'},
    {label:'Scratchboard',color:'#4d1c13',textColor:'#fde0d0',tip:'<b>Scratchboard</b><br>Subtractive drawing — scratching light from dark.'},
  ];

  function buildFixed(data,r1,r2,rot){
    var n=data.length,sl=Math.PI*2/n;
    return data.map(function(d,i){return Object.assign({},d,{r1:r1,r2:r2,
      startAngle:rot-Math.PI/2+i*sl+GAP,
      endAngle:rot-Math.PI/2+(i+1)*sl-GAP,
      textColor:d.textColor||'#c8dff8'});});
  }
  function buildOuter(){
    return outerData.map(function(d,i){
      var next=(i+1)%6;
      var sa=dividers[i]+rotOut+GAP,ea=dividers[next]+rotOut-GAP;
      if(ea<=sa)ea+=Math.PI*2;
      return Object.assign({},d,{r1:R_OUT_I,r2:R_OUT_O,startAngle:sa,endAngle:ea,textColor:'#c8dff8'});
    });
  }
  function lighten(hex,a){
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 'rgb('+Math.min(255,r+a*255)+','+Math.min(255,g+a*255)+','+Math.min(255,b+a*255)+')';
  }
  function drawSeg(seg,hov){
    wCtx.save();wCtx.beginPath();
    if(seg.r1===0){wCtx.arc(wcx,wcy,seg.r2,0,Math.PI*2);}
    else{wCtx.arc(wcx,wcy,seg.r2,seg.startAngle,seg.endAngle);wCtx.arc(wcx,wcy,seg.r1,seg.endAngle,seg.startAngle,true);wCtx.closePath();}
    wCtx.fillStyle=hov?lighten(seg.color,.16):seg.color;wCtx.fill();
    wCtx.strokeStyle='rgba(255,255,255,0.35)';wCtx.lineWidth=1.5;wCtx.stroke();
    wCtx.restore();
  }
  function wrapLines(words,maxW){
    var lines=[],cur='';
    for(var wi=0;wi<words.length;wi++){var w=words[wi];var t=cur?cur+' '+w:w;if(wCtx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}else cur=t;}
    if(cur)lines.push(cur);return lines;
  }
  function drawLabel(seg){
    if(seg.r1===0){
      wCtx.save();wCtx.textAlign='center';wCtx.textBaseline='middle';
      wCtx.fillStyle='#e8d0f8';wCtx.font='700 13px sans-serif';wCtx.fillText('RAMHAUS',wcx,wcy-9);
      wCtx.font='400 10px sans-serif';wCtx.fillStyle='rgba(232,208,248,0.75)';wCtx.fillText('Free Expression',wcx,wcy+6);
      wCtx.font='400 9px sans-serif';wCtx.fillStyle='rgba(232,208,248,0.42)';wCtx.fillText('medium of choice',wcx,wcy+18);
      wCtx.restore();return;
    }
    var mid=(seg.startAngle+seg.endAngle)/2;
    var arcLen=(seg.endAngle-seg.startAngle)*(seg.r1+seg.r2)/2;
    if(arcLen<26)return;
    var lr=(seg.r1+seg.r2)/2;
    var lx=wcx+lr*Math.cos(mid),ly=wcy+lr*Math.sin(mid);
    wCtx.save();wCtx.translate(lx,ly);
    var rot=mid+Math.PI/2;
    if(rot>Math.PI*.5&&rot<Math.PI*1.5)rot-=Math.PI;
    wCtx.rotate(rot);
    var bh=seg.r2-seg.r1,fs=bh>65?11:bh>42?10:9;
    wCtx.font='500 '+fs+'px sans-serif';wCtx.fillStyle=seg.textColor;
    wCtx.textAlign='center';wCtx.textBaseline='middle';
    var words=seg.label.split(' ');
    if(arcLen<55||words.length===1){wCtx.fillText(seg.label,0,0);}
    else{var lines=wrapLines(words,arcLen*.82);var lh=fs+2.5,th=lines.length*lh;lines.forEach(function(l,i){wCtx.fillText(l,0,-th/2+i*lh+lh/2);});}
    wCtx.restore();
  }
  function drawHandles(){
    for(var i=0;i<6;i++){
      var a=dividers[i]+rotOut;
      var hr=R_OUT_I+(R_OUT_O-R_OUT_I)*.5;
      var hx=wcx+hr*Math.cos(a),hy=wcy+hr*Math.sin(a);
      wCtx.save();wCtx.beginPath();wCtx.arc(hx,hy,7,0,Math.PI*2);
      wCtx.fillStyle='rgba(255,255,255,0.18)';wCtx.fill();
      wCtx.strokeStyle='rgba(255,255,255,0.7)';wCtx.lineWidth=1.2;wCtx.stroke();
      wCtx.strokeStyle='rgba(255,255,255,0.8)';wCtx.lineWidth=1.1;
      for(var d=-2;d<=2;d+=2){wCtx.beginPath();wCtx.moveTo(hx-2.5,hy+d);wCtx.lineTo(hx+2.5,hy+d);wCtx.stroke();}
      wCtx.restore();
    }
  }

  var wAllSegs=[];
  function wRebuild(hovIdx){
    var outer=buildOuter();
    var med=buildFixed(medData,R_MED_I,R_MED_O,rotMed);
    var elS=buildFixed(elData,R_EL_I,R_EL_O,rotEl);
    var core=[{label:'RAMHAUS',r1:0,r2:R_CORE,startAngle:0,endAngle:Math.PI*2,color:'#5e2d80',textColor:'#e8d0f8',
      tip:'<b>Free Expression</b><br>Students choose their preferred medium(s) and apply everything learned to create fully personal, expressive work.'}];
    wAllSegs=core.concat(elS).concat(med).concat(outer);
    wCtx.clearRect(0,0,SIZE,SIZE);
    wAllSegs.forEach(function(s,i){drawSeg(s,i===hovIdx);});
    wAllSegs.forEach(function(s){drawLabel(s);});
    drawHandles();
  }

  var DRAG_HIT=14;
  var wState='idle',wDragHdl=-1,wDragStartA=0,wDragStartR=0,wLastHov=-1;

  function wGetHandle(mx,my){
    for(var i=0;i<6;i++){
      var a=dividers[i]+rotOut,hr=R_OUT_I+(R_OUT_O-R_OUT_I)*.5;
      var hx=wcx+hr*Math.cos(a),hy=wcy+hr*Math.sin(a);
      if(Math.hypot(mx-hx,my-hy)<DRAG_HIT)return i;
    }
    return -1;
  }
  function wGetZone(mx,my){
    var d=Math.hypot(mx-wcx,my-wcy);
    if(d<R_CORE)return 'core';
    if(d<R_EL_O)return 'el';
    if(d<R_MED_O)return 'med';
    if(d<R_OUT_O)return 'out';
    return 'none';
  }
  function wGetHov(mx,my){
    var dist=Math.hypot(mx-wcx,my-wcy);
    var angle=((Math.atan2(my-wcy,mx-wcx)%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    for(var i=0;i<wAllSegs.length;i++){
      var s=wAllSegs[i];
      if(dist<s.r1||dist>s.r2)continue;
      if(s.r1===0)return i;
      var sa=((s.startAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      var ea=((s.endAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      if(sa<=ea?(angle>=sa&&angle<=ea):(angle>=sa||angle<=ea))return i;
    }
    return -1;
  }
  function wToC(e){
    var rect=wheelCanvas.getBoundingClientRect(),sc=SIZE/rect.width;
    var ex=e.touches?e.touches[0].clientX:e.clientX;
    var ey=e.touches?e.touches[0].clientY:e.clientY;
    return[(ex-rect.left)*sc,(ey-rect.top)*sc];
  }

  wheelCanvas.addEventListener('mousedown',function(e){
    var c=wToC(e),mx=c[0],my=c[1];
    var dh=wGetHandle(mx,my);
    if(dh>=0){wState='handle';wDragHdl=dh;wheelCanvas.style.cursor='grabbing';e.preventDefault();return;}
    var zone=wGetZone(mx,my);
    if(zone==='el'||zone==='med'||zone==='out'){
      wState='ring-'+zone;wDragStartA=Math.atan2(my-wcy,mx-wcx);
      wDragStartR=zone==='el'?rotEl:zone==='med'?rotMed:rotOut;
      wheelCanvas.style.cursor='grabbing';e.preventDefault();
    }
  });
  wheelCanvas.addEventListener('mousemove',function(e){
    var c=wToC(e),mx=c[0],my=c[1];
    if(wState==='handle'){dividers[wDragHdl]=Math.atan2(my-wcy,mx-wcx)-rotOut;tooltip.style.opacity='0';wRebuild(-1);return;}
    if(wState.indexOf('ring-')===0){
      var cur=Math.atan2(my-wcy,mx-wcx),delta=cur-wDragStartA;
      if(wState==='ring-el')rotEl=wDragStartR+delta;
      else if(wState==='ring-med')rotMed=wDragStartR+delta;
      else rotOut=wDragStartR+delta;
      tooltip.style.opacity='0';wRebuild(-1);return;
    }
    var dh=wGetHandle(mx,my),zone=wGetZone(mx,my);
    wheelCanvas.style.cursor=dh>=0?'ew-resize':(zone==='el'||zone==='med'||zone==='out')?'grab':'default';
    var idx=wGetHov(mx,my);
    if(idx!==wLastHov){wLastHov=idx;wRebuild(idx);}
    if(idx>=0){
      var wr=wheelWrap.getBoundingClientRect();
      var tx2=e.clientX-wr.left+14,ty2=e.clientY-wr.top+14;
      if(tx2+225>wr.width)tx2=e.clientX-wr.left-228;
      tooltip.style.left=tx2+'px';tooltip.style.top=ty2+'px';
      tooltip.innerHTML=wAllSegs[idx].tip||wAllSegs[idx].label;
      tooltip.style.opacity='1';
    } else tooltip.style.opacity='0';
  });
  window.addEventListener('mouseup',function(){
    if(wState!=='idle'){wState='idle';wDragHdl=-1;wheelCanvas.style.cursor='pointer';wRebuild(wLastHov);}
  });
  wheelCanvas.addEventListener('mouseleave',function(){
    if(wState==='idle'){wLastHov=-1;wRebuild(-1);tooltip.style.opacity='0';}
  });
  wheelCanvas.addEventListener('touchstart',function(e){
    var c=wToC(e),mx=c[0],my=c[1];
    var dh=wGetHandle(mx,my);
    if(dh>=0){wState='handle';wDragHdl=dh;e.preventDefault();return;}
    var zone=wGetZone(mx,my);
    if(zone==='el'||zone==='med'||zone==='out'){
      wState='ring-'+zone;wDragStartA=Math.atan2(my-wcy,mx-wcx);
      wDragStartR=zone==='el'?rotEl:zone==='med'?rotMed:rotOut;
      e.preventDefault();
    }
  },{passive:false});
  wheelCanvas.addEventListener('touchmove',function(e){
    if(wState==='idle')return;e.preventDefault();
    var c=wToC(e),mx=c[0],my=c[1];
    if(wState==='handle'){dividers[wDragHdl]=Math.atan2(my-wcy,mx-wcx)-rotOut;wRebuild(-1);return;}
    var cur=Math.atan2(my-wcy,mx-wcx),delta=cur-wDragStartA;
    if(wState==='ring-el')rotEl=wDragStartR+delta;
    else if(wState==='ring-med')rotMed=wDragStartR+delta;
    else rotOut=wDragStartR+delta;
    wRebuild(-1);
  },{passive:false});
  wheelCanvas.addEventListener('touchend',function(){wState='idle';wDragHdl=-1;wRebuild(-1);});

  // Click -> open unit page
  wheelCanvas.addEventListener('click', function(e) {
    if (wState !== 'idle') return;
    var c = wToC(e), mx = c[0], my = c[1];
    var idx = wGetHov(mx, my);
    if (idx < 0) return;
    var seg = wAllSegs[idx];
    if (!seg) return;
    openRamhausUnit(cv, meta, box, ch, seg);
  });

  wRebuild(-1);
}

function openRamhausUnit(cv, meta, box, ch, seg) {
  if (!ch.unitNotes) ch.unitNotes = {};
  cv.innerHTML = '';
  cv.style.cssText = 'padding:0;overflow-y:auto;display:flex;flex-direction:column;flex:1';

  var hdr = el('div','');
  hdr.style.cssText = 'display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--br);background:var(--s1);flex-shrink:0;position:sticky;top:0;z-index:10';

  var backBtn = el('button','');
  backBtn.style.cssText = 'background:var(--s2);border:1px solid var(--br);border-radius:7px;color:var(--mid);font-family:Rajdhani,sans-serif;font-size:.8rem;font-weight:600;letter-spacing:1px;padding:6px 14px;cursor:pointer;transition:all .15s';
  backBtn.textContent = '\u2190 Back to Wheel';
  backBtn.onmouseover = function(){ backBtn.style.borderColor='var(--gold)'; backBtn.style.color='var(--gold)'; };
  backBtn.onmouseout  = function(){ backBtn.style.borderColor='var(--br)';   backBtn.style.color='var(--mid)'; };
  backBtn.onclick = function() { renderRamhaus(cv, meta, box, ch); };

  var dot = el('div','');
  dot.style.cssText = 'width:12px;height:12px;border-radius:50%;flex-shrink:0;background:'+seg.color;

  var titleEl = el('div','');
  titleEl.style.cssText = 'font-family:Rajdhani,sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text)';
  titleEl.textContent = seg.label;

  var ringTag = el('div','');
  ringTag.style.cssText = 'font-size:.68rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-family:Rajdhani,sans-serif;font-weight:600;background:var(--s2);border:1px solid var(--br);border-radius:20px;padding:3px 10px;margin-left:auto';
  var ringName = (seg.r1 === 0) ? 'Free Expression' : seg.r2 <= 147 ? 'Elements & Principles' : seg.r2 <= 238 ? 'Mediums' : 'Ways of Working';
  ringTag.textContent = ringName;

  hdr.appendChild(backBtn); hdr.appendChild(dot); hdr.appendChild(titleEl); hdr.appendChild(ringTag);
  cv.appendChild(hdr);

  var body = el('div','');
  body.style.cssText = 'max-width:860px;width:100%;margin:0 auto;padding:28px 32px;display:flex;flex-direction:column;gap:28px';

  var overviewText = (seg.tip||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  var overSec = el('div','dj-section');
  var overLbl = el('div','dj-label'); overLbl.textContent = 'Overview';
  var overP = el('div',''); overP.style.cssText = 'font-size:.9rem;color:var(--mid);line-height:1.8'; overP.textContent = overviewText;
  overSec.appendChild(overLbl); overSec.appendChild(overP); body.appendChild(overSec);

  var noteKey = seg.label;
  if (!ch.unitNotes[noteKey]) ch.unitNotes[noteKey] = { goals:'', lessons:'', notes:'' };
  var unitData = ch.unitNotes[noteKey];

function renderChapterPage(cv,meta,box) {
  if (!curChapter) return;
  var ch=null;
  (box.chapters||[]).forEach(function(c){if(c.id===curChapter)ch=c;});
  if (!ch) return;

  // ── RAMHAUS WHEEL ──
  if (curChapter === 'ch-t1') { renderRamhaus(cv, meta, box, ch); return; }

  var page=null;
  if (curPage) (ch.pages||[]).forEach(function(p){if(p.id===curPage)page=p;});
  if (!page && ch.pages && ch.pages.length) { page=ch.pages[0]; curPage=page.id; }
  if (!page) {
    var wrap2=el('div',''); wrap2.style.maxWidth='720px';
    var empty=el('div','pg-sub'); empty.appendChild(tx('No pages yet — add one in the right sidebar.'));
    wrap2.appendChild(empty); cv.appendChild(wrap2); return;
  }

  );
  wrap.appendChild(ed.wrap); cv.appendChild(wrap);
  setTimeout(function(){ed.body.focus();},50);
}

function mkListRow(item,type){
  var row=el('div','cl-row');
  var uid=type+'-'+item.id;
  var cb=document.createElement('input'); cb.type='checkbox'; cb.id=uid; cb.checked=item.d;
  cb.style.accentColor='var(--lists)';
  var lb=el('label',item.d?'done':''); lb.htmlFor=uid; lb.appendChild(tx(item.t));
  cb.onchange=(function(it,l){return function(){it.d=cb.checked;l.className=it.d?'done':'';save();renderCanvas();};})(item,lb);
  row.appendChild(cb); row.appendChild(lb);
  if(type==='wish'){
    var tag=el('button','wpri '+(item.p||'low')); tag.appendChild(tx(item.p||'low'));
    tag.onclick=(function(it){return function(){var cyc={high:'low',low:'med',med:'high'};it.p=cyc[it.p]||'low';save();renderCanvas();};})(item);
    row.appendChild(tag);
  }
  var del=el('button','cl-del'); del.appendChild(tx('✕'));
  del.onclick=(function(it,t){return function(){
    if(t==='chore')S.lists.chores=S.lists.chores.filter(function(x){return x.id!==it.id;});
    if(t==='grocery')S.lists.grocery=S.lists.grocery.filter(function(x){return x.id!==it.id;});
    if(t==='wish')S.lists.wishlist=S.lists.wishlist.filter(function(x){return x.id!==it.id;});
    save();renderCanvas();
  };})(item,type);
  row.appendChild(del); return row;
}

function addChore(inp){var t=inp.value.trim();if(!t)return;S.lists.chores.push({id:'c'+Date.now(),t:t,d:false});inp.value='';save();renderCanvas();setTimeout(function(){var i=document.getElementById('chore-inp');if(i)i.focus();},0);}
